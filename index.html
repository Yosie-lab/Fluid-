/* ============================================================
   星空の初期化（『脳リフレクソ』の星空移植）
============================================================ */
function initStars() {
  stars = [];
  // 画面解像度に合わせて適切な星の数を計算（満天の星空にするため密度をアップ）
  const starCount = Math.floor((W * H) / 2000);
  const starColors = [
    'rgba(255, 255, 255, ', // 純白
    'rgba(224, 242, 254, ', // 青白い星
    'rgba(253, 244, 245, ', // 淡いピンクの星
    'rgba(255, 182, 220, ', // ソフトピンクの星
    'rgba(192, 132, 252, '  // 淡いパープルの星
  ];

  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.8 + 0.3, // 0.3px 〜 2.1px (奥行き感を出すため幅を広げる)
      baseAlpha: 0.10 + Math.random() * 0.70, // 0.1 〜 0.8 (明るさに強弱をつけ立体感を出す)
      twinkleSpeed: 0.003 + Math.random() * 0.012,
      phase: Math.random() * Math.PI * 2,
      colorBase: starColors[Math.floor(Math.random() * starColors.length)]
    });
  }
}

/* ============================================================
   星空のまたたきとポインター連動の視差効果
============================================================ */
function drawStars() {
  if (stars.length === 0) return;

  const centerX = W / 2;
  const centerY = H / 2;
  // マウス/タッチの位置に応じた緩やかな視差効果（画面の中心からのずれ）
  const deltaX = isPointerActive ? (pointerX - centerX) / centerX : 0;
  const deltaY = isPointerActive ? (pointerY - centerY) / centerY : 0;

  // 現在満開になっている結晶の数 (0 〜 3)
  const activatedCount = crystalNuclei.filter(n => n.activated).length;
  // 満開数に応じたブースト係数
  const brightnessBoost = 1.0 + activatedCount * 0.45; // 満開ごとに約45%明るさアップ
  const speedBoost = 1.0 + activatedCount * 0.85;       // またたき速度も段階的にアップ

  // 描画グループ化用バケット（キー: fillStyle 文字列 -> 値: 描画する星の位置とサイズのリスト）
  const buckets = {};

  for (let i = 0; i < stars.length; i++) {
    const star = stars[i];
    
    // 位相を進めてまたたきを計算 (満開数に応じてうねる速度を加速)
    star.phase += star.twinkleSpeed * speedBoost;
    const twinkle = Math.sin(star.phase);
    
    // 満開数に応じて星のアルファ値の最小値と変動幅を大きくしてキラキラ感を強調
    const minAlpha = 0.08 + activatedCount * 0.08;
    const currentAlpha = Math.max(minAlpha, (star.baseAlpha + twinkle * (0.18 + activatedCount * 0.08)) * brightnessBoost);
    
    // アルファ値を0.05刻みに丸めて同一の描画ステートに統合してパフォーマンスを維持
    const roundedAlpha = Math.min(1.0, Math.round(currentAlpha * 20) / 20);
    const fillStyle = star.colorBase + roundedAlpha + ')';

    // 星は奥にあるため、ポインターの動きと逆方向にわずかに動かす（視差効果）
    const offsetX = deltaX * -18 * (star.size / 2);
    const offsetY = deltaY * -18 * (star.size / 2);

    if (!buckets[fillStyle]) {
      buckets[fillStyle] = [];
    }
    buckets[fillStyle].push({
      x: star.x + offsetX - star.size / 2,
      y: star.y + offsetY - star.size / 2,
      size: star.size * (1.0 + activatedCount * 0.15) // 満開数に応じて星がわずかにふっくら輝く
    });
  }

  // グループごとにまとめて描画
  const fillStyles = Object.keys(buckets);
  for (let k = 0; k < fillStyles.length; k++) {
    const fillStyle = fillStyles[k];
    const list = buckets[fillStyle];
    if (!list) continue;
    ctx2d.fillStyle = fillStyle;
    for (let i = 0; i < list.length; i++) {
      const s = list[i];
      ctx2d.fillRect(s.x, s.y, s.size, s.size);
    }
  }
}

/* ============================================================
   Particle クラス
============================================================ */
class Particle {
  constructor(x, y) {
    this.x  = x ?? Math.random() * W;
    this.y  = y ?? Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    this.life   = 0.55 + Math.random() * 0.45;
    this.r      = PARTICLE_RADIUS * (0.5 + Math.random() * 0.8);
    this.alpha  = 0;
    this.phase  = Math.random() * Math.PI * 2;
    this.frozen = false;
    this.manipulated = false; // ポインターに操作されているかどうかのフラグ
  }
}

/* ============================================================ */
class CrystalNucleus {
  constructor(x, y, freq) {
    this.x = x; this.y = y; this.freq = freq;
    
    // 形状タイプを六角（hexagon）と楕円（ellipse）からランダムに決定
    const shapes = ['hexagon', 'ellipse'];
    this.shape = shapes[Math.floor(Math.random() * shapes.length)];
    // 各形状の固有パラメータ
    this.rotAngle = Math.random() * Math.PI * 2;
    this.aspectRatio = 0.55 + Math.random() * 0.35; // 0.55 〜 0.90 の楕円比率
    
    // アート性の高い不定形成長のための異方性パラメータ
    this.growthBiasAngle = Math.random() * Math.PI * 2;  // 成長が優先されるバイアス角度
    this.growthAsymmetry = 0.25 + Math.random() * 0.45;  // 異方性の強度（低いほど一方向に細長く有機的な形状になる）
    
    this.reset();
  }

  reset() {
    this.activated   = false;
    this.activatedAt = 0;
    this.energy      = 0.0;
    this.combo       = 0;
    this.lastAbsorbAt = 0;
    // 吸収沈名記録：60度ずつのセクター番号（0–5）を持つセット。
    // 3方向以上から流体を届けないと満開しない「ゆっくりまんかい流体詘」ルール。
    this.absorbedSectors = new Set();
    // 最初の中心セル（核の基準点）
    this.cells = [
      { x: this.x, y: this.y, r: CRYSTAL_STEP * 0.5, rot: Math.random() * Math.PI, grow: 0, combo: 1, idx: 0 }
    ];
    // 満開後に描画負荷をほぼゼロにするための静的テクスチャキャッシュ
    this.cacheCanvas = null;
    this.isCached = false;
  }

  /* 流体が1個吸い込まれた際の処理 */
  absorb(pX, pY) {
    if (this.activated) return;
    
    // 吸収方向のセクターを記録（SEやビジュアルの多様性のために残す）
    const angle = Math.atan2(pY - this.y, pX - this.x); // -PI ～ PI
    const sectorId = Math.floor(((angle + Math.PI) / (Math.PI * 2)) * 6) % 6; // 0–5 of 6 directions
    this.absorbedSectors.add(sectorId);
    
    // コンボ判定（直近の吸い込みが 0.4秒以内ならコンボ加算）
    const now = frameCount * 0.016;
    if (now - this.lastAbsorbAt < 0.4) {
      this.combo = Math.min(10, this.combo + 1);
    } else {
      this.combo = 1;
    }
    this.lastAbsorbAt = now;

    // 【改善】方向による成長制限を撤廃し、素直にエネルギーを加算する
    // 1粒子あたり 0.008 加算（約125個の粒子で満開）
    this.energy = Math.min(1.0, this.energy + 0.008);
    
    vibrateCrystal();
    
    // エネルギーと方向数に応じた美しい音階 SE
    playAbsorbSound(this.freq * (0.6 + this.energy * 0.4 + this.absorbedSectors.size * 0.04));

    // 吸い込まれた粒子の位置とコンボ数を渡して結晶を成長させる
    this._growUnpredictable(pX, pY, this.combo);

    // 【改善】エネルギーが 1.0 に達した時点で満開にする（3方向制限を撤廃）
    if (this.energy >= 1.0) {
      this.activate(now);
    }
  }

  activate(now) {
    if (this.activated) return;
    this.activated   = true;
    this.activatedAt = now;
    lastActivationTime = now;

    // 現在の開花した総数をチェック
    const currentActivatedCount = crystalNuclei.filter(n => n.activated).length;
    const isLastOne = (currentActivatedCount === crystalNuclei.length && crystalNuclei.length > 0);

    vibrateClear(); // 完全開花時の強めのハプティクス
    playClearChord(); // 美しいクリア和音を重ねる

    if (isLastOne) {
      playSpecialChimeSound(this.freq); // 3つ目の結晶開花時はゴージャスなチャイム音
    } else {
      playChimeSound(this.freq); // 結晶化してBloomするごとにチャイム音を鳴らす
    }

    // 開花ボーナス（5倍に強化）：花（結晶核）の周囲から新しい流動粒子がブワッと全面に美しく大噴出する！
    // 動作が重くなるのを防ぎつつ、十分な「粒子筋」を噴出させるため上限を大幅に引き上げ（1000個）
    const activeCount = particles.filter(p => !p.frozen).length;
    const maxActiveLimit = 1000;
    // 最低でも120個の粒子噴出（粒子筋）を保証し、最大で350個まで噴出させる
    const bonusCount = Math.max(120, Math.min(350, maxActiveLimit - activeCount));

    for (let i = 0; i < bonusCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      // 速度を「ほぼ静止（0.2）」から「ハイスピード（5.5）」まで不均等（ベキ乗）に分散させ、画面全体へ美しく拡散させる
      const speed = 0.2 + Math.pow(Math.random(), 1.6) * 5.3;
      
      // 生成初期位置を1点に集中させず、核の周囲（半径0〜80px）へ分散させて「柔らかな光の煙」のように出現させる
      const startDist = Math.random() * 80;
      const px = this.x + Math.cos(angle) * startDist;
      const py = this.y + Math.sin(angle) * startDist;
      
      const p = new Particle(px, py);
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.frozen = false;
      p.alpha = 0;
      
      // フェードインのタイミングをばらつかせることで、画面のあちこちでじわじわと光が浮かび上がるようにする
      p.fadeInSpeed = 0.003 + Math.random() * 0.018;
      
      // 粒子のサイズも大小を大きくばらつかせ、満天 of 星屑のような美しさにする
      p.r = PARTICLE_RADIUS * (0.3 + Math.random() * 2.2);
      p.life = 0.45 + Math.random() * 0.55; // 最大輝度もランダム
      
      particles.push(p);
    }

    // --- 星空の煌めき追加演出 (満開になるたびに150個の星を追加) ---
    const starColors = [
      'rgba(255, 255, 255, ',
      'rgba(224, 242, 254, ',
      'rgba(253, 244, 245, ',
      'rgba(255, 182, 220, ',
      'rgba(192, 132, 252, '
    ];
    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 1.9 + 0.4, // わずかに大きめの星
        baseAlpha: 0.20 + Math.random() * 0.70, // 最初から明るめ
        twinkleSpeed: 0.005 + Math.random() * 0.015,
        phase: Math.random() * Math.PI * 2,
        colorBase: starColors[Math.floor(Math.random() * starColors.length)]
      });
    }

    // 3つ目のbloom（全て満開）時の特別演出
    if (isLastOne) {
      // 1. 全開花時のスーパー流れ星をダイナミックに流す（最初の2本は即時）
      spawnBackgroundShootingStar(true);
      setTimeout(() => { spawnBackgroundShootingStar(true); }, 150);

      // 残りの2本は時間差で広範囲に流す
      setTimeout(() => { spawnBackgroundShootingStar(true); }, 600);
      setTimeout(() => { spawnBackgroundShootingStar(true); }, 1100);
    }
  }

  /* 流体が吸い込まれた位置の周辺に、ランダムに結晶を繋げていく動的成長アルゴリズム */
  _growUnpredictable(pX, pY, combo) {
    // ポインター（指・カーソル）の移動方向を検出
    const pvx = pointerX - lastPointerX;
    const pvy = pointerY - lastPointerY;
    const pSpeed = Math.sqrt(pvx * pvx + pvy * pvy);
    
    let biasAngle = this.growthBiasAngle;
    let asymmetry = this.growthAsymmetry;
    let hasPointerBias = false;
    
    // 指やカーソルが一定速度以上で動いている場合、その運動方向にバイアスをかける
    if (pSpeed > 0.5) {
      biasAngle = Math.atan2(pvy, pvx);
      asymmetry = 0.12; // 動きがあるときはより極端に細長く（軌跡を描くように）成長しやすくする
      hasPointerBias = true;
    }
    
    // 既存のセルの中から、吸い込まれた位置に最も近い「親セル」を探索（ポインターの動きによる異方性を適用）
    let bestParent = this.cells[0];
    let minDist2 = Infinity;
    
    const cosB = Math.cos(biasAngle);
    const sinB = Math.sin(biasAngle);
    
    this.cells.forEach(cell => {
      const dx = pX - cell.x, dy = pY - cell.y;
      
      // 成長バイアス角度のローカル座標系に変換
      const localX = dx * cosB + dy * sinB;
      const localY = -dx * sinB + dy * cosB;
      
      // 軸方向の距離を異方性で歪めることで、特定の結晶主軸（あるいはポインターの軌跡）に沿って枝が伸びやすくする
      const d2 = (localX * asymmetry) ** 2 + localY ** 2;
      
      if (d2 < minDist2) {
        minDist2 = d2;
        bestParent = cell;
      }
    });

    // 親セルの周囲6方向（六方格子）の接続先候補を計算
    const directions = [0, 60, 120, 180, 240, 300].map(deg => {
      const rad = deg * Math.PI / 180;
      return {
        x: bestParent.x + CRYSTAL_STEP * Math.cos(rad),
        y: bestParent.y + CRYSTAL_STEP * Math.sin(rad),
        angle: rad
      };
    });

    // 既に他のセルが置かれている重複箇所を除外する
    const margin = CRYSTAL_STEP * 0.85;
    const availableDirs = directions.filter(dir => {
      return this.cells.every(c => {
        const dx = c.x - dir.x, dy = c.y - dir.y;
        return (dx * dx + dy * dy) > margin * margin;
      });
    });

    let targetX, targetY;
    if (availableDirs.length > 0) {
      // 空いている接続先の中から、進行バイアス方向に最も近い方向を選択
      let bestDir = availableDirs[0];
      let maxDot = -Infinity;
      
      // バイアス方向（指の動きがあるときはその方向、そうでないときは吸い込まれた流体の進入方向）
      const targetVecX = hasPointerBias ? Math.cos(biasAngle) : (pX - bestParent.x);
      const targetVecY = hasPointerBias ? Math.sin(biasAngle) : (pY - bestParent.y);
      const targetLen = Math.sqrt(targetVecX * targetVecX + targetVecY * targetVecY) || 1;

      availableDirs.forEach(dir => {
        const dirVecX = dir.x - bestParent.x;
        const dirVecY = dir.y - bestParent.y;
        const dot = (dirVecX * targetVecX + dirVecY * targetVecY) / targetLen;
        if (dot > maxDot) {
          maxDot = dot;
          bestDir = dir;
        }
      });
      targetX = bestDir.x;
      targetY = bestDir.y;
    } else {
      // 完全に周囲が埋まっている場合は、指の動きの方向（または流体の方向）に強制的に新しい枝を伸ばす
      const baseAngle = hasPointerBias ? biasAngle : Math.atan2(pY - bestParent.y, pX - bestParent.x);
      const randomRad = baseAngle + (Math.random() - 0.5) * 0.6;
      targetX = bestParent.x + CRYSTAL_STEP * Math.cos(randomRad);
      targetY = bestParent.y + CRYSTAL_STEP * Math.sin(randomRad);
    }

    // 不規則性を持たせた新しい結晶セルを追加
    const newCell = {
      x: targetX,
      y: targetY,
      // コンボ（たくさん集めて吸い込ませる）ほど結晶が大きく育つ！
      r: CRYSTAL_STEP * 0.45 * (0.82 + Math.random() * 0.32) * (1.0 + combo * 0.05),
      // ピースの回転角をランダムにし、毎回異なる幾何学模様にする
      rot: Math.random() * Math.PI,
      grow: 0, // 0 から 1 へ向けたアニメーションフラグ
      combo: combo, // 生成時のコンボ数
      idx: this.cells.length // 生成順
    };
    this.cells.push(newCell);

    // 結晶成長の光の波紋を生成 (コンボ数で規模を変化)
    crystalRipples.push({
      x: targetX,
      y: targetY,
      r: 0,
      maxR: newCell.r * (2.0 + Math.min(combo * 0.2, 1.2)),
      speed: 0.8 + Math.random() * 0.6,
      alpha: 1.0,
      combo: combo,
      idx: newCell.idx
    });
  }
}

/* ============================================================
   カウントダウンリングUI
============================================================ */
let svgProgressEl = null;
let carbonatedBufferCache = null;

// 脳リフレクソから移植した炭酸音バッファの事前生成
function pregenerateCarbonatedBuffer() {
  // ★iOS対策: getAudioCtx()を呼ばず、直接グローバルのaudioCtxを参照する
  const ctx = audioCtx;
  if (carbonatedBufferCache || !ctx) return;
  
  try {
    const durationSeconds = 6.5;
    const sampleRate = ctx.sampleRate;
    const bufferSize = sampleRate * durationSeconds;
    
    const audioBuffer = ctx.createBuffer(2, bufferSize, sampleRate);
    const leftData = audioBuffer.getChannelData(0);
    const rightData = audioBuffer.getChannelData(1);
    
    // 1. ベースノイズの合成
    for (let i = 0; i < bufferSize; i++) {
      const time = i / sampleRate;
      const amp = Math.min(1.0, time / 0.15) * Math.exp(-time / 2.0) * 0.032;
      const noise = Math.random() * 2 - 1;
      leftData[i] = noise * amp;
      rightData[i] = noise * amp;
    }
    
    // 2. パチパチ音（200個に軽量化し、起動時の負荷を大きく削減。ディレイ回路が補うため豊かな響きは維持）
    const bubbleCount = 200;
    const clickDuration = durationSeconds - 0.2;
    
    for (let i = 0; i < bubbleCount; i++) {
      let timeOffset;
      if (i < 160) {
        timeOffset = Math.pow(Math.random(), 1.4) * 4.0;
      } else {
        timeOffset = 4.0 + Math.random() * (clickDuration - 4.0);
      }
      
      const isNoise = Math.random() < 0.35;
      const clickLen = isNoise 
        ? (0.003 + Math.random() * 0.006) 
        : (0.004 + Math.random() * 0.012);

      const startSample = Math.floor(timeOffset * sampleRate);
      const lengthSamples = Math.floor(clickLen * sampleRate);

      let volumeMultiplier = 1.0;
      if (timeOffset <= 4.0) {
        volumeMultiplier = 1.7 - (timeOffset / 4.0) * 0.5;
      } else {
        const postRatio = (timeOffset - 4.0) / (clickDuration - 4.0);
        volumeMultiplier = Math.max(0.12, 1.0 - postRatio * 0.88);
      }

      const maxVolume = (isNoise
        ? (0.026 + Math.random() * 0.028)
        : (0.020 + Math.random() * 0.022)) * volumeMultiplier * 0.85;

      // 各個別の泡の定位（ステレオの広がり）
      const clickPan = (Math.random() * 2 - 1);
      const gainL = Math.cos((clickPan + 1) * Math.PI / 4);
      const gainR = Math.sin((clickPan + 1) * Math.PI / 4);

      const clickFreq = 2800 + Math.random() * 6800;

      for (let j = 0; j < lengthSamples; j++) {
        const idx = startSample + j;
        if (idx >= bufferSize) break;

        const progress = j / lengthSamples;
        const env = Math.exp(-progress * 4.5) * (1.0 - progress);

        let val = 0;
        if (isNoise) {
          val = (Math.random() * 2 - 1) * maxVolume * env;
        } else {
          const angle = (j / sampleRate) * clickFreq * Math.PI * 2;
          val = Math.sin(angle) * maxVolume * env;
        }

        leftData[idx] += val * gainL;
        rightData[idx] += val * gainR;
      }
    }
    
    carbonatedBufferCache = audioBuffer;
  } catch (e) {
    console.warn("炭酸バブルバッファの事前生成エラー:", e);
  }
}

// 『脳リフレクソ』風の背景流れ星と波紋システム
let bgMeteors = [];
let bgRipples = [];
let lastShootingStarTime = Date.now();
let nextShootingStarDelay = 10000 + Math.random() * 20000; // 10秒〜30秒のランダム

// 自然な背景流れ星の生成
function spawnBackgroundShootingStar(isSuper = false) {
  const startFromLeft = Math.random() < 0.5;
  let startX, startY;
  
  if (startFromLeft) {
    startX = -150;
    startY = Math.random() * H * 0.40;
  } else {
    startX = Math.random() * W * 0.50;
    startY = -150;
  }
  
  const angle = (18 + Math.random() * 22) * Math.PI / 180;
  // スーパー流れ星は高速で流れる (速度1.5倍)
  const speed = (isSuper ? 24 : 14) + Math.random() * 6; 
  
  bgMeteors.push({
    x: startX,
    y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    speed: speed,
    angle: angle,
    // スーパー流れ星は尾の長さも幅も大きくする
    length: (isSuper ? 380 : 120) + Math.random() * 120,
    width: (isSuper ? 3.0 : 1.0) + Math.random() * 0.8,
    alpha: 0,
    fadeSpeed: isSuper ? 0.28 : 0.18,
    // スーパー流れ星は少し明度を抑え、上品に背景に馴染むようにする
    targetAlpha: (isSuper ? 0.45 : 0.52) + Math.random() * 0.12,
    maxLife: (isSuper ? 45 : 20) + Math.random() * 15,
    life: 0
  });
}

// 自然な背景波紋の生成
function createBackgroundRipple(x, y, maxR, speed, hue) {
  bgRipples.push({
    x: x,
    y: y,
    r: 0,
    maxR: maxR || (90 + Math.random() * 70),
    speed: speed || (1.5 + Math.random() * 0.8),
    alpha: 0.8,
    hue: hue || (185 + Math.random() * 25)
  });
}

// 流れ星と波紋の更新
function updateBgEffects() {
  const now = Date.now();
  if (now - lastShootingStarTime >= nextShootingStarDelay) {
    spawnBackgroundShootingStar();
    lastShootingStarTime = now;
    nextShootingStarDelay = 10000 + Math.random() * 30000; // 次回は10秒〜40秒
  }

  // 自動波紋生成
  if (Math.random() < 0.008) {
    const rx = Math.random() * W;
    const ry = Math.random() * H;
    createBackgroundRipple(rx, ry);
  }

  // 流れ星の更新
  for (let i = bgMeteors.length - 1; i >= 0; i--) {
    const m = bgMeteors[i];
    m.x += m.vx;
    m.y += m.vy;
    m.life++;

    if (m.life > m.maxLife * 0.6) {
      m.alpha = m.targetAlpha * (1 - (m.life - m.maxLife * 0.6) / (m.maxLife * 0.4));
    } else if (m.alpha < m.targetAlpha) {
      m.alpha = Math.min(m.targetAlpha, m.alpha + m.fadeSpeed);
    }

    if (m.life >= m.maxLife || m.x < -m.length || m.x > W + m.length || m.y < -m.length || m.y > H + m.length) {
      bgMeteors.splice(i, 1);
    }
  }

  // 波紋の更新
  for (let i = bgRipples.length - 1; i >= 0; i--) {
    const r = bgRipples[i];
    r.r += r.speed;
    r.alpha = 0.8 * (1.0 - (r.r / r.maxR));
    if (r.r >= r.maxR || r.alpha <= 0) {
      bgRipples.splice(i, 1);
    }
  }
}

// 流れ星と波紋の描画
function drawBgEffects() {
  // 波紋の描画
  bgRipples.forEach(r => {
    const color = `hsla(${r.hue}, 70%, 75%, ${r.alpha * 0.55})`;
    ctx2d.strokeStyle = color;
    ctx2d.lineWidth = 3.2;
    ctx2d.beginPath();
    ctx2d.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx2d.stroke();

    // 擬似グロー効果
    ctx2d.strokeStyle = `hsla(${r.hue}, 70%, 75%, ${r.alpha * 0.15})`;
    ctx2d.lineWidth = 6.4;
    ctx2d.beginPath();
    ctx2d.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx2d.stroke();
  });

  // 流れ星の描画
  bgMeteors.forEach(m => {
    const tailX = m.x - m.vx * (m.length / m.speed);
    const tailY = m.y - m.vy * (m.length / m.speed);

    const grad = ctx2d.createLinearGradient(m.x, m.y, tailX, tailY);
    grad.addColorStop(0, `rgba(255, 255, 255, ${m.alpha})`);
    grad.addColorStop(0.3, `rgba(242, 246, 255, ${m.alpha * 0.85})`);
    grad.addColorStop(1, `rgba(255, 255, 255, 0)`);

    const glowGrad = ctx2d.createLinearGradient(m.x, m.y, tailX, tailY);
    glowGrad.addColorStop(0, `rgba(255, 255, 255, ${m.alpha * 0.22})`);
    glowGrad.addColorStop(0.5, `rgba(240, 245, 255, 0)`);

    ctx2d.save();
    ctx2d.lineCap = 'round';

    // グロー線
    ctx2d.strokeStyle = glowGrad;
    ctx2d.lineWidth = m.width * 1.5;
    ctx2d.beginPath();
    ctx2d.moveTo(m.x, m.y);
    ctx2d.lineTo(tailX, tailY);
    ctx2d.stroke();

    // 実線
    ctx2d.strokeStyle = grad;
    ctx2d.lineWidth = m.width;
    ctx2d.beginPath();
    ctx2d.moveTo(m.x, m.y);
    ctx2d.lineTo(tailX, tailY);
    ctx2d.stroke();

    ctx2d.restore();
  });
}

const RING_R = 52;
const RING_C = 2 * Math.PI * RING_R;

function initReadyRing() {
  const svgEl = document.querySelector('#readyRing svg');
  /* セキュア: DOMParser で SVG 構造を生成（innerHTML 不使用） */
  const doc = new DOMParser().parseFromString(
    `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">` +
    `<circle cx="60" cy="60" r="${RING_R}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>` +
    `<circle id="rp" cx="60" cy="60" r="${RING_R}" fill="none" stroke="currentColor" stroke-width="1.8"` +
    ` stroke-linecap="round" stroke-dasharray="${RING_C}" stroke-dashoffset="${RING_C}"` +
    ` transform="rotate(-90 60 60)" style="transition:stroke 0.4s"/>` +
    `</svg>`,
    'image/svg+xml'
  );
  svgEl.replaceChildren(doc.documentElement);
  svgProgressEl = document.getElementById('rp');
}

function startReadyRing() {
  nucleiEnabled = false;
  graceStartTime = performance.now();

  const wrap  = document.getElementById('readyWrap');
  const label = document.getElementById('readyLabel');
  wrap.classList.add('show');

  if (svgProgressEl) {
    svgProgressEl.setAttribute('stroke-dashoffset', String(RING_C));
    svgProgressEl.style.stroke = getComputedStyle(document.documentElement)
      .getPropertyValue('--skin-accent').trim() || '#00d4ff';
  }

  function tick() {
    const elapsed  = performance.now() - graceStartTime;
    const fraction = Math.min(elapsed / GRACE_MS, 1);
    const offset   = RING_C * (1 - fraction);
    if (svgProgressEl) svgProgressEl.setAttribute('stroke-dashoffset', String(offset));

    if (fraction < 1) {
      rafReadyId = requestAnimationFrame(tick);
    } else {
      /* 猶予終了 → 核を有効化 */
      nucleiEnabled = true;
      wrap.classList.remove('show');
      label.textContent = '流体を導こう';
    }
  }
  if (rafReadyId) cancelAnimationFrame(rafReadyId);
  rafReadyId = requestAnimationFrame(tick);
}

/* ============================================================
   ゲーム初期化
============================================================ */
function initGame() {
  resize();

  particles     = [];
  crystalNuclei = [];
  clearTriggered = false;
  nucleiEnabled  = false;
  hasInteracted  = false;
  lastActivationTime = 0;
  frameCount     = 0;
  STATE.phase    = 'flow';

  /* 結晶核を配置（黄金螺旋ベースの美的アシンメトリー配置） */
  const margin = Math.min(W, H) * 0.2;
  const centerX = W / 2;
  const centerY = H / 2;
  const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // 約137.5度（黄金角）
  const baseAngle = Math.random() * Math.PI * 2;   // 開始角度をゲーム毎にランダム化

  for (let i = 0; i < NUCLEUS_COUNT; i++) {
    // 黄金角に基づき、螺旋状に展開させることで、重ならずかつ美しい非対称の構図を作る
    const angle = baseAngle + i * goldenAngle + (Math.random() - 0.5) * 0.25; // わずかなゆらぎ
    // 中心からの距離。中央のロゴ表示領域（SPACEY BLOOM）にかからないよう、最小回避距離（160pxまたはW/Hの24%）を確保する
    const minAvoidDist = Math.max(165, Math.min(W, H) * 0.24);
    const distRange = Math.min(W, H) * 0.26;
    const dist = minAvoidDist + (i / NUCLEUS_COUNT) * distRange + Math.random() * 30;

    let nx = centerX + Math.cos(angle) * dist;
    let ny = centerY + Math.sin(angle) * dist;

    // 画面外にはみ出さないようにマージン内にクリップ
    nx = Math.max(margin, Math.min(W - margin, nx));
    ny = Math.max(margin, Math.min(H - margin, ny));

    const freq  = SKINS[STATE.skinId].soundFreq * (1 + i * 0.25);
    crystalNuclei.push(new CrystalNucleus(nx, ny, freq));
  }

  /* パーティクル配置（安全距離確保） */
  for (let i = 0; i < MAX_PARTICLES; i++) {
    let px, py;
    for (let attempt = 0; attempt < 12; attempt++) {
      px = Math.random() * W;
      py = Math.random() * H;
      const safe = crystalNuclei.every(n => {
        const d2 = (px - n.x) ** 2 + (py - n.y) ** 2;
        return d2 >= NUCLEUS_SAFE_ZONE * NUCLEUS_SAFE_ZONE;
      });
      if (safe) break;
    }
    const p = new Particle(px, py);
    const cx = W / 2, cy = H / 2;
    const ddx = p.x - cx, ddy = p.y - cy;
    const dd  = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
    p.vx = (-ddy / dd) * 0.2 * Math.random();
    p.vy = ( ddx / dd) * 0.2 * Math.random();
    particles.push(p);
  }

  /* 星空の初期配置 */
  initStars();

  /* カウントダウンリング開始 */
  if (hasGameStarted) {
    startReadyRing();
  }
}

/* ============================================================
   スパークエフェクト（結晶核が高エネルギー時に発射される光の粒）
============================================================ */
function updateDrawSparks(skin) {
  const baseHue = getSkinHue(STATE.skinId);

  for (let i = sparkParticles.length - 1; i >= 0; i--) {
    const sp = sparkParticles[i];
    sp.x  += sp.vx;
    sp.y  += sp.vy;
    sp.vx *= 0.92;
    sp.vy *= 0.92;
    sp.life -= 0.030;

    if (sp.life <= 0) {
      sparkParticles.splice(i, 1);
      continue;
    }

    const alpha = sp.life * 0.88;
    const hue   = (baseHue + sp.hueOffset + 360) % 360;
    ctx2d.save();
    ctx2d.globalAlpha = alpha;
    ctx2d.shadowBlur  = 10;
    ctx2d.shadowColor = `hsl(${hue}, 92%, 78%)`;
    ctx2d.fillStyle   = `hsl(${hue}, 92%, 80%)`;
    ctx2d.beginPath();
    ctx2d.arc(sp.x, sp.y, sp.r * sp.life, 0, Math.PI * 2);
    ctx2d.fill();
    ctx2d.restore();
  }

  // スパーク数を上限以下に制限（パフォーマンス保護）
  if (sparkParticles.length > 100) {
    sparkParticles.splice(0, sparkParticles.length - 100);
  }
}

/* 結晶成長時の局所光波紋の更新と描画（成長段階に合わせたグラデーション） */
function updateDrawCrystalRipples(skin) {
  const baseHue = getSkinHue(STATE.skinId);
  const _bPal = BLOOM_PALETTES[STATE.bloomPaletteId] || BLOOM_PALETTES[0];

  for (let i = crystalRipples.length - 1; i >= 0; i--) {
    const rp = crystalRipples[i];
    rp.r += rp.speed;
    rp.alpha = 1.0 - (rp.r / rp.maxR);

    if (rp.alpha <= 0 || rp.r >= rp.maxR) {
      crystalRipples.splice(i, 1);
      continue;
    }

    // パレットの性質に基づき色相を決定
    let hue;
    if (_bPal.hueMin !== null) {
      const _range = _bPal.hueMax - _bPal.hueMin;
      hue = _bPal.hueMin + ((rp.idx * _bPal.hueShift) % _range);
    } else {
      hue = (baseHue + rp.idx * _bPal.hueShift) % 360;
    }

    ctx2d.save();
    ctx2d.globalAlpha = rp.alpha * 0.75;
    ctx2d.strokeStyle = `hsla(${hue}, ${_bPal.sat}%, ${_bPal.lit + 10}%, ${rp.alpha})`;
    ctx2d.shadowBlur = 8 + rp.combo * 2;
    ctx2d.shadowColor = `hsl(${hue}, ${_bPal.sat}%, 70%)`;
    // コンボが高いほど太く頼もしい波紋になる
    ctx2d.lineWidth = 1.0 + (rp.combo > 5 ? 1.0 : 0.5) * rp.alpha;

    ctx2d.beginPath();
    ctx2d.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx2d.stroke();
    ctx2d.restore();
  }

  // 最大波紋数制限
  if (crystalRipples.length > 50) {
    crystalRipples.splice(0, crystalRipples.length - 50);
  }
}

/* サウンドの動的音量＆音色制御（操作中・成長度合いに呼応して環境音を輝かせる） */
function modulateSolfeggioVolume() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  
  // 1. 操作中の音量モジュレーション
  if (solfeggioMasterGain) {
    const targetVol = isPointerDown ? 0.0055 : 0.0035;
    try {
      solfeggioMasterGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + 0.35);
    } catch (_) {}
  }

  // 2. 結晶の成長度合い（エネルギー総量）に呼応するフィルターの明るさモジュレーション
  if (solfeggioFilterNode && crystalNuclei.length > 0) {
    let totalEnergy = 0;
    crystalNuclei.forEach(n => {
      // 活性化済みなら最大値(1.0)として加算
      totalEnergy += n.activated ? 1.0 : n.energy;
    });
    const avgEnergy = totalEnergy / crystalNuclei.length; // 0.0 〜 1.0
    
    // 成長につれてフィルターを 600Hz から 1350Hz に向かって開き、ハミングを明るく華やかにする
    const targetFreq = 600 + avgEnergy * 750;
    try {
      solfeggioFilterNode.frequency.linearRampToValueAtTime(targetFreq, audioCtx.currentTime + 0.4);
    } catch (_) {}
  }
}

/* ============================================================
   メインゲームループ
============================================================ */
function gameLoop() {
  animId = requestAnimationFrame(gameLoop);
  frameCount++;

  const skin = SKINS[STATE.skinId];
  ctx2d.clearRect(0, 0, W, H);

  /* 背景グラデーション */
  const bgGrad = ctx2d.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, skin.bgA);
  bgGrad.addColorStop(1, skin.bgB);
  ctx2d.fillStyle = bgGrad;
  ctx2d.fillRect(0, 0, W, H);

  /* 『脳リフレクソ』移植のまたたく星空背景 */
  drawStars();
  updateBgEffects();
  drawBgEffects();

  const t = frameCount * 0.016;

  updateParticles(t, skin);
  drawCrystals(t, skin);
  drawNuclei(t, skin);
  updateDrawSparks(skin);         // スパークエフェクト更新・描画
  updateDrawCrystalRipples(skin);  // 結晶成長の光の波紋更新・描画
  if (isPointerActive) drawPointerGlow(skin);

  // 操作に連動した環境音の音量・音色制御（3フレームに1度で十分）
  if (frameCount % 3 === 0) modulateSolfeggioVolume();

  /* クリア判定は十分な操作かつ猶予後 */
  if (!clearTriggered && STATE.phase !== 'clear' && nucleiEnabled && hasInteracted) {
    checkClear();
  }
}

/* ============================================================
   パーティクル更新 & 描画
============================================================ */
function updateParticles(t, skin) {
  const pX = pointerX, pY = pointerY;
  const now = frameCount * 0.016;

  // 描画グループ化用バケット（キー: "roundedAlpha_roundedRadius" -> 値: パーティクル座標リスト）
  const buckets = {};

  particles.forEach(p => {
    if (p.frozen) return;

    if (p.alpha < p.life) {
      const rate = p.fadeInSpeed || 0.005;
      p.alpha = Math.min(p.life, p.alpha + rate);
    }

    p.phase += 0.018;
    const fx = Math.sin(p.phase * 0.6 + p.y * 0.0022) * 0.28;
    const fy = Math.cos(p.phase * 0.45 + p.x * 0.0022) * 0.28;

    /* ポインター引力（ホバー時にも吸い寄せ、クリック・ドラッグ中はより強力に） */
    p.manipulated = false;
    if (isPointerActive) {
      const distX = pX - p.x, distY = pY - p.y;
      const dist2 = distX * distX + distY * distY;
      const currentRadius = isPointerDown ? currentInfluenceRadius * 1.5 : currentInfluenceRadius;
      if (dist2 < currentRadius * currentRadius && dist2 > 1) {
        const dist  = Math.sqrt(dist2);
        const brake = dist < 20 ? (dist / 20) : 1;
        const forceMultiplier = isPointerDown ? 1.5 : 0.7;
        const force = (1 - dist / currentRadius) ** 2.0 * forceMultiplier * brake;
        p.vx += (distX / dist) * force;
        p.vy += (distY / dist) * force;
        
        // ポインターのすぐ近く（引力範囲の45%以内）でしっかり操作されている流体のみを「操作中」と判定
        // これにより、画面全体の流体が勝手に他所の結晶核を活性化するのを防ぎます
        if (dist < currentRadius * 0.45) {
          p.manipulated = true;
        }
      }
    }

    p.vx = (p.vx + fx) * VISCOSITY;
    p.vy = (p.vy + fy) * VISCOSITY;

    /* 最高速度を 6.2 に制限して、とろみと操作性のバランスを取る */
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (speed > 6.2) { p.vx *= 6.2 / speed; p.vy *= 6.2 / speed; }

    p.x += p.vx; p.y += p.vy;

    if (p.x < -p.r)   p.x = W + p.r;
    if (p.x > W + p.r) p.x = -p.r;
    if (p.y < -p.r)   p.y = H + p.r;
    if (p.y > H + p.r) p.y = -p.r;

    /* 結晶核への吸い込み & 衝突判定 */
    if (nucleiEnabled && hasInteracted) {
      crystalNuclei.forEach(nucleus => {
        if (nucleus.activated) return;
        
        const ddx = nucleus.x - p.x, ddy = nucleus.y - p.y;
        const dist2 = ddx * ddx + ddy * ddy;
        const absorbRadius = CRYSTAL_RADIUS * 5.5; // 吸い込み開始判定範囲を大きく展開（螺旋の軌道を長く美しく見せる）
        
        if (dist2 < absorbRadius * absorbRadius) {
          const dist = Math.sqrt(dist2);
          
          if (p.manipulated) {
            // 中心に近づくほど、粒子サイズを徐々に小さくして「吸い込まれて消える」演出
            if (dist < CRYSTAL_RADIUS * 2.0) {
              const shrinkFrac = (dist - CRYSTAL_RADIUS * 0.5) / (CRYSTAL_RADIUS * 1.5);
              p.r = PARTICLE_RADIUS * Math.max(0.05, Math.min(1.0, shrinkFrac)) * (0.5 + Math.random() * 0.8);
            }

            if (dist < CRYSTAL_RADIUS * 0.4) {
              // 十分に中心に近づいたら吸い込まれて消滅（核に吸収される）
              p.frozen = true;
              p.alpha = 0;
              // 吸い込み座標(p.x, p.y)を渡し、そこに向かって結晶を成長させる
              nucleus.absorb(p.x, p.y);
            } else {
              // 渦巻き（スパイラル）吸い込み力: 中心に近づくほど強力になるスピン引力
              const progress = (1 - dist / absorbRadius); // 0.0 (外周) 〜 1.0 (中心)
              const pullForce = progress ** 2.2 * 0.28;
              
              // 中心方向への引力
              p.vx += (ddx / dist) * pullForce;
              p.vy += (ddy / dist) * pullForce;
              
              // 渦を巻く方向への接線力（スパイラル演出）
              const tangentX = -ddy / dist;
              const tangentY = ddx / dist;
              const swirlForce = progress * 0.28;
              p.vx += tangentX * swirlForce;
              p.vy += tangentY * swirlForce;

              // 吸い込まれている粒子は一時的に少し輝きを増す（エネルギーの糸）
              p.alpha = Math.min(p.life * 1.5, p.alpha + 0.02);

              // 中心に近いほど速く、外周ではゆっくり吸い込まれるように最高速度制限を動的変更
              const speedLimit = 0.5 + progress * 2.5;
              const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
              if (speed > speedLimit) {
                p.vx *= speedLimit / speed;
                p.vy *= speedLimit / speed;
              }
            }
          }
        }
      });
    }

    /* 描画データの蓄積 */
    const ratio = Math.min(speed / 5.0, 1);
    const drawAlpha = p.alpha * (0.42 + ratio * 0.15);
    const drawRadius = p.r * 0.72 * (1 + ratio * 0.25);

    // アルファ値を0.1刻み、半径を0.5刻みに丸めることで描画バケットを制限
    const roundedAlpha = Math.round(drawAlpha * 10) / 10;
    const roundedRadius = Math.round(drawRadius * 2) / 2;

    if (roundedAlpha > 0 && roundedRadius > 0) {
      const key = roundedAlpha + '_' + roundedRadius;
      if (!buckets[key]) {
        buckets[key] = [];
      }
      buckets[key].push({ x: p.x, y: p.y });
    }
  });

  // グループごとにまとめて一括描画（Canvas APIの呼び出しを大幅に削減、Object.keysで安全に反復）
  const bucketKeys = Object.keys(buckets);
  for (let k = 0; k < bucketKeys.length; k++) {
    const key = bucketKeys[k];
    const parts = key.split('_');
    const alpha = parseFloat(parts[0]);
    const radius = parseFloat(parts[1]);
    
    if (isNaN(alpha) || isNaN(radius)) continue;

    const list = buckets[key];
    if (!list || list.length === 0) continue;

    ctx2d.fillStyle = hexAlpha(skin.fluidA, alpha);
    ctx2d.beginPath();
    for (let i = 0; i < list.length; i++) {
      const pos = list[i];
      // 複数の円パスを繋げるために moveTo でサブパスを開始
      ctx2d.moveTo(pos.x + radius, pos.y);
      ctx2d.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    }
    ctx2d.fill();
  }
  
  // 吸収されて消滅した不要な粒子を配列から完全にパージ（除去）し、走査負荷をゼロにする
  particles = particles.filter(p => !p.frozen);

  // エネルギー粒子が足りなくならないよう、減った分の粒子をリスポーン（再生成）
  const safeZoneSqr = NUCLEUS_SAFE_ZONE * NUCLEUS_SAFE_ZONE;
  while (particles.length < MAX_PARTICLES) {
    let px = Math.random() * W;
    let py = Math.random() * H;
    for (let attempt = 0; attempt < 4; attempt++) {
      const safe = crystalNuclei.every(n => {
        const dx = px - n.x, dy = py - n.y;
        return (dx * dx + dy * dy) >= safeZoneSqr;
      });
      if (safe) break;
      px = Math.random() * W;
      py = Math.random() * H;
    }
    const p = new Particle(px, py);
    p.fadeInSpeed = 0.015; // 徐々にフェードインして出現させる

    const cx = W / 2, cy = H / 2;
    const ddx = p.x - cx, ddy = p.y - cy;
    const dd  = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
    p.vx = (-ddy / dd) * 0.2 * Math.random();
    p.vy = ( ddx / dd) * 0.2 * Math.random();
    particles.push(p);
  }
}

/* ============================================================
   結晶描画（オフスクリーンキャッシュ対応）
============================================================ */
function drawCrystals(t, skin) {
  crystalNuclei.forEach(nucleus => {
    if (nucleus.cells.length === 0) return;

    // すでにキャッシュ画像が作られている場合は、1枚の静止画像として一瞬で高速描画
    if (nucleus.isCached && nucleus.cacheCanvas) {
      ctx2d.drawImage(nucleus.cacheCanvas, 0, 0);
      return;
    }

    const baseHue = getSkinHue(STATE.skinId);
    let allGrown = true; // すべてのピースの成長が終わったかを記録

    nucleus.cells.forEach(cell => {
      // 結合時のジワッとした出現アニメーション
      if (cell.grow < 1.0) {
        // 満開になった結晶核は一瞬（0.2秒）で成長を完了させ、直ちに静的キャッシュへ切り替えて描画負荷を排除
        const growSpeed = nucleus.activated ? 0.08 : 0.004;
        cell.grow = Math.min(1.0, cell.grow + growSpeed);
        allGrown = false;
      }

      const r = cell.r * cell.grow;
      const a = 0.12 + cell.grow * 0.78;

      // 色彩の計算: 選択中の Bloom パレットに従い色相を決定
      const comboBonus = cell.combo ? cell.combo * 5 : 0;
      const _bPal = BLOOM_PALETTES[STATE.bloomPaletteId] || BLOOM_PALETTES[0];
      let cellHue;
      if (_bPal.hueMin !== null) {
        // 指定範囲内で振動（hueMin〜hueMax）
        const _range = _bPal.hueMax - _bPal.hueMin;
        cellHue = _bPal.hueMin + ((cell.idx * _bPal.hueShift + comboBonus * 0.5) % _range);
        
        // レインボー(id:0)の場合、紺色(225度)の領域を増やすために引き寄せ補正
        if (_bPal.id === 0) {
          const targetHue = 225;
          let diff = targetHue - cellHue;
          if (diff > 180) diff -= 360;
          if (diff < -180) diff += 360;
          cellHue = (cellHue + diff * 0.38 + 360) % 360;
        }
      } else {
        // レインボー: baseHue 起点で全色相回転
        cellHue = (baseHue + cell.idx * _bPal.hueShift + comboBonus) % 360;
      }

      // 【凝固発光演出】: まだ実体化しきっていない（grow < 1）の時は、白熱した熱い光として白っぽく発光
      const isSolidifying = cell.grow < 1.0;
      const lightness = isSolidifying ? (88 - cell.grow * 20) : (_bPal.lit + (cell.combo > 5 ? 8 : 0));
      const saturation = isSolidifying ? (45 + cell.grow * 45) : _bPal.sat;

      const strokeColor = `hsla(${cellHue}, ${saturation}%, ${lightness}%, ${a * 0.7})`;
      const fillOpacity = (isSolidifying ? (0.25 - cell.grow * 0.15) : 0.12) * (1.0 + (cell.combo || 1) * 0.012) * cell.grow;
      const fillColor = `hsla(${(cellHue + 25) % 360}, ${_bPal.sat}%, ${_bPal.lit}%, ${a * fillOpacity})`;

      ctx2d.save();
      ctx2d.globalAlpha = a;
      ctx2d.strokeStyle = strokeColor;
      
      const baseLineWidth = isSolidifying ? (1.5 - cell.grow * 0.8) : 0.7;
      ctx2d.lineWidth   = (baseLineWidth + (cell.combo || 1) * 0.12) * cell.grow;
      ctx2d.fillStyle   = fillColor;

      // セルごとの個別座標・不規則回転を適用
      ctx2d.translate(cell.x, cell.y);
      ctx2d.rotate(cell.rot);
      
      // 原点で六角形を描画
      hexPath(ctx2d, 0, 0, r);
      ctx2d.fill();
      ctx2d.stroke();
      ctx2d.restore();
    });

    // 満開になり、全てのセルの出現アニメーション（4秒）が終わった段階で、結晶全体をキャッシュ化する
    if (nucleus.activated && allGrown && !nucleus.isCached) {
      createNucleusCache(nucleus, skin);
    }
  });
}

/* ============================================================
   結晶のオフスクリーンキャッシュ生成（160個以上のセル描画を1回に凝縮）
============================================================ */
function createNucleusCache(nucleus, skin) {
  const c = document.createElement('canvas');
  c.width = W;
  c.height = H;
  const ctx = c.getContext('2d');
  
  const baseHue = getSkinHue(STATE.skinId);

  nucleus.cells.forEach(cell => {
    const r = cell.r;
    const a = 0.9; // 安定後の最大の不透明度

    const _bPalC = BLOOM_PALETTES[STATE.bloomPaletteId] || BLOOM_PALETTES[0];
    let cellHue;
    if (_bPalC.hueMin !== null) {
      const _rangeC = _bPalC.hueMax - _bPalC.hueMin;
      cellHue = _bPalC.hueMin + ((cell.idx * _bPalC.hueShift + (cell.combo ? cell.combo * 2.5 : 0)) % _rangeC);
      
      // レインボー(id:0)の場合、紺色(225度)の領域を増やすために引き寄せ補正
      if (_bPalC.id === 0) {
        const targetHue = 225;
        let diff = targetHue - cellHue;
        if (diff > 180) diff -= 360;
        if (diff < -180) diff += 360;
        cellHue = (cellHue + diff * 0.38 + 360) % 360;
      }
    } else {
      cellHue = (baseHue + cell.idx * _bPalC.hueShift + (cell.combo ? cell.combo * 5 : 0)) % 360;
    }

    // 目に優しい調整済みの安定した色設定
    const strokeColor = `hsla(${cellHue}, ${_bPalC.sat}%, ${_bPalC.lit}%, ${a * 0.7})`;
    const fillOpacity = 0.12 * (1.0 + (cell.combo || 1) * 0.012);
    const fillColor = `hsla(${(cellHue + 25) % 360}, ${_bPalC.sat}%, ${_bPalC.lit}%, ${a * fillOpacity})`;

    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth   = 0.7 + (cell.combo || 1) * 0.12;
    ctx.fillStyle   = fillColor;

    // 個別トランスフォーム
    ctx.translate(cell.x, cell.y);
    ctx.rotate(cell.rot);
    
    hexPath(ctx, 0, 0, r);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  });

  nucleus.cacheCanvas = c;
  nucleus.isCached = true;
}

/* ============================================================
   結晶核（脈動リング）描画
============================================================ */
function drawNuclei(t, skin) {
  crystalNuclei.forEach(nucleus => {
    if (nucleus.activated) return;
    const pulse     = (Math.sin(t * 2.8 + nucleus.x * 0.01) + 1) * 0.5;
    /* 猶予中は暗め、猶予後は明るく */
    const baseAlpha = nucleiEnabled ? 0.55 + pulse * 0.45 : 0.18 + pulse * 0.18;

    ctx2d.save();
    // 結晶核の影の強さを抑え、マイルドにする（28->14, 12->6）
    ctx2d.shadowBlur  = (nucleiEnabled ? 14 : 6) + pulse * 14;
    ctx2d.shadowColor = skin.glow;
    ctx2d.strokeStyle = skin.glow;

    const rInner = CRYSTAL_RADIUS * (0.68 + pulse * 0.32);
    const rOuter = CRYSTAL_RADIUS * 2.2 + pulse * 12;

    /* 形状に応じたパス作成関数 */
    const drawShapePath = (ctx, x, y, r, shape, rot, aspect) => {
      ctx.beginPath();
      if (shape === 'hexagon') {
        ctx.translate(x, y);
        ctx.rotate(rot);
        for (let i = 0; i < 6; i++) {
          const angle = (i * Math.PI) / 3;
          ctx.lineTo(Math.cos(angle) * r * 1.1, Math.sin(angle) * r * 1.1);
        }
        ctx.closePath();
      } else if (shape === 'ellipse') {
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.ellipse(0, 0, r * 1.2, r * 1.2 * aspect, 0, 0, Math.PI * 2);
      }
    };

    /* 内リング */
    ctx2d.globalAlpha = baseAlpha * 0.8;
    ctx2d.lineWidth   = nucleiEnabled ? 1.4 : 0.8;
    ctx2d.save();
    drawShapePath(ctx2d, nucleus.x, nucleus.y, rInner, nucleus.shape, nucleus.rotAngle, nucleus.aspectRatio);
    ctx2d.stroke();
    ctx2d.restore();

    /* 外リング */
    ctx2d.globalAlpha = baseAlpha * 0.2;
    ctx2d.lineWidth   = 0.8;
    ctx2d.save();
    drawShapePath(ctx2d, nucleus.x, nucleus.y, rOuter, nucleus.shape, nucleus.rotAngle, nucleus.aspectRatio);
    ctx2d.stroke();
    ctx2d.restore();

    /* 中心点 */
    ctx2d.globalAlpha = nucleiEnabled ? 0.75 : 0.25;
    ctx2d.fillStyle   = skin.glow;
    ctx2d.shadowBlur  = nucleiEnabled ? 20 : 8;
    ctx2d.beginPath();
    ctx2d.arc(nucleus.x, nucleus.y, nucleiEnabled ? 4 : 2.0, 0, Math.PI * 2);
    ctx2d.fill();

    ctx2d.restore();

    /* エネルギー80%以上でスパーク発射（開花直前の「もうすぐ咲く！」期待感演出） */
    if (!nucleus.activated && nucleus.energy >= 0.80 && nucleiEnabled) {
      const spawnChance = (nucleus.energy - 0.79) * 0.28;
      if (Math.random() < spawnChance) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.0 + Math.random() * 3.0;
        sparkParticles.push({
          x: nucleus.x + Math.cos(angle) * CRYSTAL_RADIUS * 1.3,
          y: nucleus.y + Math.sin(angle) * CRYSTAL_RADIUS * 1.3,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          r: 1.3 + Math.random() * 2.0,
          hueOffset: Math.random() * 50 - 25,
        });
      }
    }
  });
}

/* ============================================================
   ポインターグロー描画
============================================================ */
function drawPointerGlow(skin) {
  const vx = pointerX - lastPointerX, vy = pointerY - lastPointerY;
  const speed = Math.sqrt(vx * vx + vy * vy);
  const gr    = 65 + speed * 1.5;

  const grad = ctx2d.createRadialGradient(pointerX, pointerY, 0, pointerX, pointerY, gr);
  grad.addColorStop(0,   hexAlpha(skin.fluidA, 0.38));
  grad.addColorStop(0.5, hexAlpha(skin.fluidA, 0.09));
  grad.addColorStop(1,   hexAlpha(skin.fluidA, 0));

  ctx2d.save();
  ctx2d.shadowBlur  = 28 + speed * 0.5;
  ctx2d.shadowColor = skin.glow;
  ctx2d.fillStyle   = grad;
  ctx2d.beginPath();
  ctx2d.arc(pointerX, pointerY, gr, 0, Math.PI * 2);
  ctx2d.fill();

  /* ハロリング: 脈動する二重リングで「引き寄せ力」を視覚的に演出 */
  const t = frameCount * 0.016;
  const pulse = (Math.sin(t * 5.8) + 1) * 0.5;
  const haloR1 = 16 + pulse * 8;
  const haloR2 = 32 + pulse * 11;
  const baseAlpha  = isPointerDown ? 0.72 : 0.38;
  const speedBonus = Math.min(speed * 0.022, 0.28);

  ctx2d.shadowBlur  = 16 + pulse * 10;
  ctx2d.shadowColor = skin.glow;

  // 内リング（鮮明）
  ctx2d.strokeStyle = hexAlpha(skin.fluidA, baseAlpha + speedBonus);
  ctx2d.lineWidth   = 1.5 + pulse * 0.7;
  ctx2d.beginPath();
  ctx2d.arc(pointerX, pointerY, haloR1, 0, Math.PI * 2);
  ctx2d.stroke();

  // 外リング（薄め）
  ctx2d.strokeStyle = hexAlpha(skin.fluidA, (baseAlpha * 0.30) + speedBonus * 0.4);
  ctx2d.lineWidth   = 0.8;
  ctx2d.beginPath();
  ctx2d.arc(pointerX, pointerY, haloR2, 0, Math.PI * 2);
  ctx2d.stroke();

  ctx2d.restore();
}

/* ============================================================
   クリア判定
============================================================ */
function checkClear() {
  /* 重要: 空配列の every() は true を返すため、核の存在を確認する */
  if (crystalNuclei.length === 0) return;
  const allActivated = crystalNuclei.every(n => n.activated);
  if (!allActivated) return;
  triggerClear();
}


function triggerClear() {
  if (clearTriggered) return;
  clearTriggered = true;
  STATE.phase    = 'clear';

  stopFlowNoise();
  playClearChord();
  playCarbonatedSound(); // 炭酸音を追加
  vibrateClear();
  particles.forEach(p => { p.life = 0.01; });

  setTimeout(() => {
    const clr = document.getElementById('clearOverlay');
    /* inline style をリセットして CSS transition を有効にする */
    clr.style.opacity      = '';
    clr.style.pointerEvents = '';
    clr.classList.add('show');
  }, 2800);

  /* 自動ループタイマーは廃止し、ユーザーが手動で「もう一度」を押すまで無限に眺められるようにします */
}


/* ============================================================
   ゲーム終了（タイトルに戻る）
============================================================ */
function exitGame() {
  stopFlowNoise();
  if (animId)      cancelAnimationFrame(animId);
  if (rafReadyId)  cancelAnimationFrame(rafReadyId);

  /* クリアオーバーレイをリセット */
  const clr = document.getElementById('clearOverlay');
  if (clr) {
    clr.classList.remove('show');
    clr.style.opacity      = '0';
    clr.style.pointerEvents = 'none';
  }

  const readyWrap = document.getElementById('readyWrap');
  if (readyWrap) readyWrap.classList.remove('show');

  /* ヒントを復活させる */
  const hint = document.getElementById('hint');
  if (hint) hint.classList.remove('hidden');

  hasGameStarted = false;

  /* スタートオーバーレイを再表示 */
  const startOverlay = document.getElementById('startOverlay');
  if (startOverlay) {
    startOverlay.classList.remove('hidden');
  }

  /* スパーク粒子と光波紋をリセット */
  sparkParticles = [];
  crystalRipples = [];

  initGame();
  gameLoop();
}


/* ============================================================
   ゲームリセット
============================================================ */
function resetGame() {
  stopFlowNoise();
  if (animId)      cancelAnimationFrame(animId);
  if (rafReadyId)  cancelAnimationFrame(rafReadyId);

  /* クリアオーバーレイを確実にリセット（transition中でも即座に適用） */
  const clr = document.getElementById('clearOverlay');
  clr.classList.remove('show');
  clr.style.opacity      = '0';
  clr.style.pointerEvents = 'none';

  document.getElementById('readyWrap').classList.remove('show');
  /* ヒントを復活させる */
  document.getElementById('hint').classList.remove('hidden');

  /* スパーク粒子と光波紋をリセット */
  sparkParticles = [];
  crystalRipples = [];

  initGame();
  gameLoop();

  /* ヒントを4秒後に消す */
  setTimeout(() => {
    document.getElementById('hint').classList.add('hidden');
  }, 4500);
}


/* ============================================================
   ユーティリティ: 16進 + アルファ
============================================================ */
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

/* ============================================================
   入力イベント
============================================================ */
function getPos(e) {
  return e.changedTouches && e.changedTouches.length
    ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY }
    : { x: e.clientX, y: e.clientY };
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  if (STATE.phase === 'clear') {
    // クリア時の鑑賞モードトグル
    const clr = document.getElementById('clearOverlay');
    if (clr) {
      if (clr.style.opacity === '0') {
        clr.style.opacity = '1';
        clr.style.pointerEvents = 'all';
      } else {
        clr.style.opacity = '0';
        clr.style.pointerEvents = 'none';
      }
    }
    return;
  }
  isPointerDown = true;
  isPointerActive = true;
  hasInteracted = true; /* ユーザーが最初に操作した */
  const p = getPos(e); pointerX = lastPointerX = p.x; pointerY = lastPointerY = p.y;
  startFlowNoise(); vibrateFluid();
  document.getElementById('hint').classList.add('hidden');
}, { passive: false });

canvas.addEventListener('mousemove', e => {
  e.preventDefault();
  isPointerActive = true;
  lastPointerX = pointerX; lastPointerY = pointerY;
  const p = getPos(e); pointerX = p.x; pointerY = p.y;
}, { passive: false });

canvas.addEventListener('mouseup', () => {
  isPointerDown = false; stopFlowNoise();
}, { passive: true });

canvas.addEventListener('mouseleave', () => {
  isPointerActive = false;
  isPointerDown = false;
  stopFlowNoise();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  isPointerDown = true;
  isPointerActive = true;
  hasInteracted = true; /* ユーザーが最初に操作した */
  const p = getPos(e); pointerX = lastPointerX = p.x; pointerY = lastPointerY = p.y;
  startFlowNoise(); vibrateFluid();
  document.getElementById('hint').classList.add('hidden');
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  isPointerActive = true;
  lastPointerX = pointerX; lastPointerY = pointerY;
  const p = getPos(e); pointerX = p.x; pointerY = p.y;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isPointerDown = false;
  isPointerActive = false;
  stopFlowNoise();
  unlockAudio();
}, { passive: true });

/* スキンと調和するBloomカラーパレットの対応テーブル定義 */
const HARMONIOUS_MATCHES = {
  0: [1, 2, 5, 0], // 白銀スキン：ディープオーシャン、ミッドナイト、ブルーパープル、レインボー
  1: [2, 5, 6, 0], // 大気圏スキン：ミッドナイト、ブルーパープル、シャイニーピンク、レインボー
  2: [0, 6, 5, 3], // 桜スキン：レインボー、シャイニーピンク、ブルーパープル、フォレスト
  3: [0, 5, 2, 6, 4], // 星雲スキン：レインボー、ブルーパープル、ミッドナイト、シャイニーピンク、サンセット
  4: [1, 2, 5, 0], // クリスタルスキン：ディープオーシャン、ミッドナイト、ブルーパープル、レインボー
  5: [4, 2, 0, 5], // 黄金スキン：サンセット、ミッドナイト、レインボー、ブルーパープル
  6: [6, 5, 0, 2]  // シャイニーピンクスキン：シャイニーピンク、ブルーパープル、レインボー、ミッドナイト
};

/* テーマスキンとBloomカラーのセンスの良いランダム組み合わせ適用 */
function applyRandomTheme() {
  const prevSkinId = STATE.skinId;
  const prevBloomId = STATE.bloomPaletteId;

  // 1. スキンをランダムに決定（直前と異なるもの）
  let nextSkinId;
  do {
    nextSkinId = Math.floor(Math.random() * SKINS.length);
  } while (nextSkinId === prevSkinId && SKINS.length > 1);

  // 2. 調和するBloomカラーを決定（直前と異なるものを優先）
  const matchCandidates = HARMONIOUS_MATCHES[nextSkinId] || [0, 1, 2, 3, 4, 5, 6];
  let nextBloomId;
  let attempts = 0;
  do {
    nextBloomId = matchCandidates[Math.floor(Math.random() * matchCandidates.length)];
    attempts++;
  } while (nextBloomId === prevBloomId && matchCandidates.length > 1 && attempts < 10);

  // 3. 状態適用と保存
  applySkin(nextSkinId);
  STATE.bloomPaletteId = nextBloomId;
  try {
    localStorage.setItem('fc_skinId', String(nextSkinId));
    localStorage.setItem('fc_bloomPaletteId', String(nextBloomId));
  } catch (_) {}

  // 4. 環境音の周波数がスキンによって変わるため、オシレーターを止めずに周波数を滑らかに移行する
  if (STATE.soundEnabled) {
    updateSolfeggioFrequencies();
  }

  // スパーク粒子をリセット
  sparkParticles = [];
  crystalRipples = [];

  // ゲームリセット開始
  hasGameStarted = true;
  resetGame();
}

  applySkin(STATE.skinId);
  resetGame();  /* 初回ロード時のみ明示的に呼ぶ */

  setTimeout(() => {
    const loader = document.getElementById('loader');
    if (loader) {
      loader.classList.add('done');
      setTimeout(() => loader.remove(), 900);
    }
  }, 300);

  /* スタートオーバーレイのクリック制御 */
  const startOverlay = document.getElementById('startOverlay');
  if (startOverlay) {
    const handleStart = () => {
      if (hasGameStarted) return;
      if (skinPanelOpen) {
        closeSkinPanel();
        return;
      }
      hasGameStarted = true;

      // サウンドのアンロックを実行
      unlockAudio();

      // iOSの制限を回避するため、遅延を挟まずユーザーのタップと同じコールスタックで直接同期生成する
      pregenerateCarbonatedBuffer();

      startOverlay.classList.add('hidden');

      // ゲームのカウントダウンを開始
      startReadyRing();
    };

    // Chrome / Safari (iOS) での確実なアンロックを狙うため、物理ボタン要素にバインドする
    const btnStartGame = document.getElementById('btnStartGame');
    if (btnStartGame) {
      btnStartGame.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleStart();
      }, { passive: false });

      btnStartGame.addEventListener('click', (e) => {
        handleStart();
      });
    }
  }
});
</script>
</body>
</html>
