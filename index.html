<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spacey Bloom — 宇宙と結晶の癒しゲーム</title>
  <meta name="description" content="宇宙の流動体を導き、星の結晶を咲かせる。脳を解放する究極の癒しゲーム Spacey Bloom。">
  <!-- Google Fonts Outfit -->
  <!-- TODO(security): CDN依存を削減するためにフォントをローカルホスティングに移行することを検討してください -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       デザインシステム & CSS 変数
    ============================================================ */
    :root {
      --skin-fluid-a:   #00f5ff;
      --skin-fluid-b:   #0080ff;
      --skin-crystal-a: #ffffff;
      --skin-crystal-b: #a8e6ff;
      --skin-glow:      #00f5ff;
      --skin-bg-a:      #000510;
      --skin-bg-b:      #001830;
      --skin-accent:    #00d4ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--skin-bg-a);
      font-family: 'Outfit', sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #gameCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: none;
    }

    /* ============================================================
       UI オーバーレイ（極限まで引き算）
    ============================================================ */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10000;
    }

    #controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: all;
    }

    .ctrl-btn {
      width: 40px; height: 40px; /* タップ可能領域確保のため 40px に拡大 */
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      opacity: 0.6; /* プレイの邪魔にならないよう、通常時は不透明度 60% に抑える */
    }
    .ctrl-btn:hover {
      border-color: var(--skin-accent);
      color: var(--skin-accent);
      opacity: 1.0;
      transform: scale(1.05);
    }
    .ctrl-btn:active { transform: scale(0.94); }

    /* ============================================================
       カウントダウンリング（猶予期間UI）
    ============================================================ */
    #readyWrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #readyWrap.show { opacity: 1; }

    #readyRing {
      position: relative;
      width: 120px; height: 120px;
    }
    #readyRing svg {
      width: 120px; height: 120px;
      overflow: visible;
    }
    #readyLabel {
      font-size: 11px;
      font-weight: 200;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      text-align: center;
    }

    /* ============================================================
       スキン選択パネル（ボトムシート）
    ============================================================ */
    #skinPanel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(4, 10, 24, 0.96);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px 24px 0 0;
      padding: 16px 20px 44px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10001;
      pointer-events: all;

      /* iPhone SE などの小さな画面でスクロールできるように制限・設定 */
      max-height: 82vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y; /* 縦方向スワイプスクロールのみネイティブで許容 */
    }
    #skinPanel.open { transform: translateY(0); }

    .settings-sys-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .settings-sys-btn {
      flex: 1;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: rgba(224, 242, 254, 0.8);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .settings-sys-btn:active {
      background: rgba(255,255,255,0.1);
      transform: scale(0.97);
    }

    .panel-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .skin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .skin-card {
      border-radius: 14px;
      padding: 14px 12px 12px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.025);
      position: relative;
      overflow: hidden;
    }
    .skin-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--card-a, #00f5ff18), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .skin-card:hover { transform: translateY(-2px); }
    .skin-card:hover::before { opacity: 1; }
    .skin-card.active {
      border-color: var(--card-a, #00f5ff);
      box-shadow: 0 0 18px var(--card-a, #00f5ff)40;
    }
    .skin-card.locked { cursor: default; }
    .skin-card.locked:hover { transform: none; }

    .skin-preview {
      width: 100%; aspect-ratio: 1.6;
      border-radius: 8px;
      margin-bottom: 9px;
      position: relative;
      overflow: hidden;
    }
    .skin-name {
      font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,0.75);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .skin-price {
      font-size: 11px; font-weight: 200;
      color: rgba(255,255,255,0.35);
      margin-top: 3px;
    }
    .lock-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 13px;
    }

    /* ── Bloom カラーパレット選択チップ ── */
    .bloom-palette-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .bloom-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      transition: border-color 0.2s, background 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    .bloom-chip:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }
    .bloom-chip.active {
      border-color: var(--chip-color, #ffffff);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.15), 0 0 8px var(--chip-color, rgba(255,255,255,0.4));
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      font-weight: 400;
    }
    .bloom-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ============================================================
       クリアオーバーレイ
    ============================================================ */
    #clearOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
      z-index: 9998;
    }
    #clearOverlay.show { opacity: 1; pointer-events: all; }

    .clear-sub {
      font-size: clamp(11px, 2.5vw, 14px);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      text-indent: 0.35em;
    }
    .clear-restart {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 18px; /* 12px 36px から縮小 */
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 30px; /* 50px から縮小 */
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Outfit', sans-serif;
      font-size: 11px; /* 13px から縮小 */
      font-weight: 300;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      text-indent: 0.18em;
    }
    .clear-restart:hover {
      border-color: var(--skin-accent);
      color: var(--skin-accent);
      box-shadow: 0 0 16px var(--skin-accent)33;
    }


    /* ============================================================
       チュートリアルヒント
    ============================================================ */
    #hint {
      position: fixed;
      bottom: 56px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px; font-weight: 200;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.28);
      text-align: center;
      pointer-events: none;
      transition: opacity 1.2s ease;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    /* スキントースト通知 */
    #skinToast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 14, 24, 0.74);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 24px;
      border-radius: 30px;
      color: rgba(224, 242, 254, 0.85);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      opacity: 0;
      pointer-events: none;
      z-index: 10002;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    #skinToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    /* ============================================================
       ローダー
    ============================================================ */
    #loader {
      position: fixed;
      inset: 0;
      background: #000510;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--skin-accent);
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 14px var(--skin-glow);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* トースト用アニメーション */
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* スタートオーバーレイ用スタイル */
    #startOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      cursor: pointer;
      background: rgba(8, 14, 24, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }
    #startOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .start-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(24px, 5.5vw, 36px);
      font-weight: 200;
      letter-spacing: 0.38em;
      color: rgba(224, 242, 254, 0.62); /* 明るさをさらにもう10%抑えた、青みがかった半透明白 */
      margin-bottom: 32px;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .logo-main {
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.4), 0 0 30px rgba(0, 245, 255, 0.2);
      animation: logoFade 4s ease-in-out infinite alternate;
      text-indent: 0.38em; /* 右側の余白偏りを補正 */
    }
    .logo-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--skin-accent), var(--skin-fluid-a), transparent);
      opacity: 0.85;
      box-shadow: 0 0 8px var(--skin-glow);
    }
    .start-sub {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      user-select: none;
      -webkit-user-select: none;
      transition: all 0.3s ease;
      text-indent: 0.25em;
    }
    @keyframes logoFade {
      0% { opacity: 0.75; filter: blur(0.5px) brightness(0.9); }
      100% { opacity: 1.0; filter: blur(0px) brightness(1.1); }
    }

  </style>
</head>
<body>

<!-- スタートオーバーレイ -->
<div id="startOverlay" role="dialog" aria-label="ゲームスタート">
  <h1 class="start-title"><span class="logo-main">SPACEY BLOOM</span><span class="logo-line"></span></h1>
  <div class="start-sub">タップして開始</div>
</div>

<!-- ローダー -->
<div id="loader" aria-hidden="true"><div class="loader-ring"></div></div>

<!-- ゲームキャンバス -->
<canvas id="gameCanvas" aria-label="Fluid and Crystal game canvas"></canvas>

<!-- 最小UIオーバーレイ -->
<div id="ui" role="complementary" aria-label="ゲームコントロール">
  <div id="controls">
    <button class="ctrl-btn" id="btnSettings" aria-label="設定" title="設定">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- カウントダウンリング（猶予期間UI） -->
<div id="readyWrap" aria-hidden="true">
  <div id="readyRing">
    <!-- SVGはJSで安全に生成 -->
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="readyLabel">流体を導こう</div>
</div>

<!-- スキン選択パネル -->
<div id="skinPanel" role="dialog" aria-label="設定" aria-hidden="true">
  <div class="panel-handle"></div>
  <p class="panel-title">テーマを選択</p>
  <div class="skin-grid" id="skinGrid"></div>

  <p class="panel-title" style="margin-top:20px;">Bloom カラー</p>
  <div class="bloom-palette-grid" id="bloomPaletteGrid" role="group" aria-label="Bloomカラーパターン選択"></div>

  <p class="panel-title" style="margin-top:20px;">システム設定</p>
  <div class="settings-sys-row">
    <button class="settings-sys-btn" id="btnSoundSettings" aria-label="サウンドオンオフ">サウンド: ON</button>
    <button class="settings-sys-btn" id="btnResetSettings" aria-label="設定を閉じてゲームを再開する">再開</button>
  </div>
</div>

<!-- クリアオーバーレイ -->
<div id="clearOverlay" role="status" aria-live="polite">
  <div class="start-title"><span class="logo-main">SPACEY BLOOM</span><span class="logo-line"></span></div>
  <div class="clear-sub">脳が解放される</div>
  <button class="clear-restart" id="clearRestart" aria-label="もう一度プレイする">もう一度</button>
</div>

<!-- チュートリアルヒント -->
<div id="hint" aria-label="操作ヒント">画面をなぞって光る流体を導こう</div>

<!-- スキントースト通知 -->
<div id="skinToast" role="status" aria-live="polite"></div>

<script>
/*
 * TODO(security): 本番環境では以下の HTTP セキュリティヘッダーを設定してください:
 *   Content-Security-Policy: default-src 'self'; script-src 'self' 'nonce-{RANDOM}';
 *                             font-src https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com;
 *   X-Frame-Options: DENY
 *   X-Content-Type-Options: nosniff
 *   Permissions-Policy: camera=(), microphone=(), geolocation=()
 * インラインスクリプトを含むため nonce または hash ベースの CSP が必要です。
 * TODO(security): 将来の課金機能には OAuth 2.0 プロバイダーを使用してください。
 * TODO(security): ゲーム設定のみ localStorage に保存。機密情報は一切保存しません。
 */
'use strict';

/* ============================================================
   スキン定義（完全ホワイトリスト — ユーザー入力なし・XSS対策済み）
============================================================ */
const SKINS = [
  {
    id: 0, name: '🤍 白銀 × 銀世界',
    fluidA: '#f0f5fa', fluidB: '#b8cbd8',  // 流体：青白い白銀
    crystalA: '#e2e8f0', crystalB: '#cbd5e1', // 結晶：シルバーのまま
    glow: '#e0ebf5', bgA: '#050508', bgB: '#101015', accent: '#e0ebf5',
    soundFreq: 264, // ソルフェジオ 528Hzの1オクターブ下 (恐怖からの解放・グラウンディング)
  },
  {
    id: 1, name: '🌍 ブルー × 大気圏',
    fluidA: '#33a3ff', fluidB: '#0022dd',  // 流体：もう少し明るい鮮明なブルー
    crystalA: '#80c8ff', crystalB: '#ffffff', // 結晶：澄み切った青白結晶
    glow: '#66c2ff', bgA: '#010308', bgB: '#001133', accent: '#66c2ff',
    soundFreq: 852, // ソルフェジオ 852Hz (直感の覚醒・インスピレーション)
  },
  {
    id: 2, name: '🌸 桜 × 翡翠',
    fluidA: '#ffd5e0', fluidB: '#fff0f3',
    crystalA: '#50fa7b', crystalB: '#a8ffb8',
    glow: '#ffd5e0', bgA: '#080008', bgB: '#180010', accent: '#ffd5e0',
    soundFreq: 639, // ソルフェジオ 639Hz (愛・調和・人間関係の修復)
  },
  {
    id: 3, name: '🌌 星雲 × 深宇宙',
    fluidA: '#9d50ff', fluidB: '#4f0aff',
    crystalA: '#ffe066', crystalB: '#ffffff',
    glow: '#9d50ff', bgA: '#02000f', bgB: '#0a0030', accent: '#bb86fc',
    soundFreq: 963, // ソルフェジオ 963Hz (宇宙とのつながり・高次元の活性化)
  },
  {
    id: 4, name: '💧 水 × クリスタル',
    fluidA: '#00f5ff', fluidB: '#0080ff',
    crystalA: '#e0f8ff', crystalB: '#a8e6ff',
    glow: '#00f5ff', bgA: '#000510', bgB: '#001830', accent: '#00d4ff',
    soundFreq: 528, // ソルフェジオ 528Hz (奇跡・DNA修復)
  },
  {
    id: 5, name: '✨ 黄金 × 琥珀',
    fluidA: '#fff700', fluidB: '#ffd700',

/* ============================================================
   Web Audio API サウンドエンジン
============================================================ */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

let reverbNode = null;
let solfeggioOscs = [];
let solfeggioLFOs = [];
let solfeggioNodes = [];
let solfeggioFilterNode = null;

/* 528Hzを主音とする美しい「ド・ミ・ソ・シ・レ (Cmaj9)」コーラス環境音の開始（ピンポンディレイ回路） */
function startAmbientSolfeggio() {
  if (!STATE.soundEnabled || solfeggioOscs.length > 0) return;
  const ctx = getAudioCtx();
  if (!ctx || ctx.state !== 'running') return;

  const now = ctx.currentTime;
  try {
    // 5声が重なるため、全体の音量は少し控えめ（0.0035）に調整して薄く包む
    const solfeggioGain = ctx.createGain();
    solfeggioGain.gain.setValueAtTime(0, now);
    solfeggioGain.gain.linearRampToValueAtTime(0.0035, now + 4.5); // 4.5秒かけてフェードイン
    solfeggioNodes.push(solfeggioGain);

    // キンキンした高音を和らげるローパスフィルター
    solfeggioFilterNode = ctx.createBiquadFilter();
    solfeggioFilterNode.type = 'lowpass';
    solfeggioFilterNode.frequency.setValueAtTime(600, now);
    solfeggioNodes.push(solfeggioFilterNode);

    // 左右のステレオディレイ（ディープな広がりのための長めのタイム）
    const delayL = ctx.createDelay();
    const delayR = ctx.createDelay();
    delayL.delayTime.setValueAtTime(0.35, now); // 350ms
    delayR.delayTime.setValueAtTime(0.48, now); // 480ms
    solfeggioNodes.push(delayL, delayR);

    // フィードバックゲイン（心地よい持続: 0.55）
    const fbL = ctx.createGain();
    const fbR = ctx.createGain();
    fbL.gain.setValueAtTime(0.55, now);
    fbR.gain.setValueAtTime(0.55, now);
    solfeggioNodes.push(fbL, fbR);

    // 交差フィードバック（ピンポン効果を最大化: 0.22）
    const crossL = ctx.createGain();
    const crossR = ctx.createGain();
    crossL.gain.setValueAtTime(0.22, now);
    crossR.gain.setValueAtTime(0.22, now);
    solfeggioNodes.push(crossL, crossR);

    // ミックスゲイン
    const directGain = ctx.createGain();
    directGain.gain.setValueAtTime(0.25, now); // 直接音は控えめにして輪郭をぼかす
    solfeggioNodes.push(directGain);

    const revMix = ctx.createGain();
    revMix.gain.setValueAtTime(0.95, now); // 残響を強め（95%）にミックス
    solfeggioNodes.push(revMix);

    // 接続処理
    // 畳み込みリバーブ（残響ノード）を取得し、アンビエント和音と贅沢に結合
    const reverb = getReverbNode(ctx);
    
    // リバーブへのセンドゲイン（環境音の残響を深く心地よく調整）
    const reverbSend = ctx.createGain();
    reverbSend.gain.setValueAtTime(0.68, now); // 深い宇宙空間のように包み込む 68% のセンド量
    solfeggioNodes.push(reverbSend);

    solfeggioGain.connect(solfeggioFilterNode);
    solfeggioFilterNode.connect(directGain);
    directGain.connect(ctx.destination);

    // フィルタ音を直接リバーブへも送り、音像を心地よくぼかす
    solfeggioFilterNode.connect(reverbSend);
    solfeggioFilterNode.connect(delayL);
    solfeggioFilterNode.connect(delayR);

    delayL.connect(fbL); fbL.connect(delayL);
    delayR.connect(fbR); fbR.connect(delayR);

    delayL.connect(crossL); crossL.connect(delayR);
    delayR.connect(crossR); crossR.connect(delayL);

    delayL.connect(revMix); delayR.connect(revMix);
    
    // 左右ディレイの反響音もリバーブへ送って空気中に美しく拡散
    delayL.connect(reverbSend);
    delayR.connect(reverbSend);

    revMix.connect(ctx.destination);
    reverbSend.connect(reverb);

    // Cmaj9和音構成（ド・ミ・ソ・シ・レ）
    // 主音の528HzをC5（ド）として、純正律に近い比率で美しい和声を構成
    const chord = [
      { f: 528,   vol: 1.0,  lfoSpeed: 0.18 }, // ド (基準音 C5)
      { f: 660,   vol: 0.8,  lfoSpeed: 0.22 }, // ミ (E5: 1.25倍)
      { f: 792,   vol: 0.7,  lfoSpeed: 0.15 }, // ソ (G5: 1.5倍)
      { f: 990,   vol: 0.5,  lfoSpeed: 0.26 }, // シ (B5: 1.875倍 - テンション)
      { f: 594,   vol: 0.6,  lfoSpeed: 0.13 }, // レ (D5: 1.125倍 - オクターブ下げて中低域を支える)
    ];

    chord.forEach(tone => {
      const osc = ctx.createOscillator();
      const toneGain = ctx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(tone.f, now);

      // コーラス効果：各声の周波数を微小に揺らすLFO（変調周期をそれぞれずらす）
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.type = 'sine';
      lfo.frequency.setValueAtTime(tone.lfoSpeed, now);
      lfoGain.gain.setValueAtTime(2.2, now); // ±2.2Hzの揺れ幅で繊細なうねり（コーラス感）を演出

      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(now);
      solfeggioLFOs.push(lfo);
      solfeggioNodes.push(lfoGain);

      // 各音のバランス音量を適用
      toneGain.gain.setValueAtTime(tone.vol, now);
      
      osc.connect(toneGain);
      toneGain.connect(solfeggioGain);
      osc.start(now);
      
      solfeggioOscs.push(osc);
      solfeggioNodes.push(toneGain);
    });

  } catch (e) {
    console.warn("ソルフェジオ環境音の開始に失敗しました:", e);
  }
}

/* ソルフェジオ環境音の停止 */
function stopAmbientSolfeggio() {
  solfeggioOscs.forEach(osc => {
    try { osc.stop(); osc.disconnect(); } catch (_) {}
  });
  solfeggioOscs = [];

  solfeggioLFOs.forEach(lfo => {
    try { lfo.stop(); lfo.disconnect(); } catch (_) {}
  });
  solfeggioLFOs = [];

  solfeggioNodes.forEach(node => {
    try { node.disconnect(); } catch (_) {}
  });
  solfeggioNodes = [];
  solfeggioFilterNode = null;
}

/* 畳み込みリバーブ用インパルス応答（3.2秒の深いステレオ残響） */
function createReverbBuffer(ctx, duration, decay) {
  const sampleRate = ctx.sampleRate;
  const len = sampleRate * duration;
  const buf = ctx.createBuffer(2, len, sampleRate);
  for (let c = 0; c < 2; c++) {
    const data = buf.getChannelData(c);
    let lastVal = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      // 【改善】金属的なキーンという共鳴（ハウリング感）を防ぐため、1次ローパスで高域を滑らかにカット
      const lpVal = lastVal * 0.88 + white * 0.12;
      lastVal = lpVal;
      data[i] = lpVal * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

function getReverbNode(ctx) {
  if (reverbNode) return reverbNode;
  const convolver = ctx.createConvolver();
  convolver.buffer = createReverbBuffer(ctx, 3.2, 2.0); // 3.2秒の深く心地よい残響
  convolver.connect(ctx.destination);
  reverbNode = convolver;
  return reverbNode;
}

/* iOS (iPhone) Safari の音声保護ロックを確実に解除する処理 */
function unlockAudio() {
  const ctx = getAudioCtx();
  if (ctx) {
    if (ctx.state === 'running') {
      startAmbientSolfeggio();
      return;
    }

    // 1. 同期的コールスタック内でまずダミー音（オシレーター）を再生
    playDummySound(ctx);

    // 2. その後、同期的コールスタック内で resume() を呼び出す
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => {
        removeUnlockListeners();
        startAmbientSolfeggio();
      }).catch(err => {
        console.error("Audio Context Resume Failed:", err);
      });
    } else {
      removeUnlockListeners();
      startAmbientSolfeggio();
    }
  }
}

function playDummySound(ctx) {
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    osc.start(0);
    osc.stop(ctx.currentTime + 0.05);
  } catch (e) {}
}

function removeUnlockListeners() {
  window.removeEventListener('click', unlockAudio);
  window.removeEventListener('touchend', unlockAudio);
}

// iOSでは click と、タッチを離した瞬間(touchend)が最も確実にアンロックトリガーとして機能します
window.addEventListener('click', unlockAudio);
window.addEventListener('touchend', unlockAudio);

let flowNoiseSource = null, flowNoiseGain = null, flowNoiseActive = false;

function startFlowNoise() {
  startAmbientSolfeggio(); // 操作開始時に環境音を確実に再生開始する
  return; // 風のようなノイズ音を消去
  if (!STATE.soundEnabled || flowNoiseActive) return;
  const ctx = getAudioCtx();
  if (!ctx) return;

  const _play = () => {
    if (flowNoiseActive) return;

    const bufSize = ctx.sampleRate * 2;
    const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 900; lpf.Q.value = 0.4;

    const gain = ctx.createGain();
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.045, now + 0.35);

    src.connect(lpf); lpf.connect(gain); gain.connect(ctx.destination);
    src.start();
    flowNoiseSource = src; flowNoiseGain = gain; flowNoiseActive = true;
  };

  if (ctx.state === 'suspended') {
    // 同期的にアンロック処理（オシレーター再生 → resume() のシーケンス）を開始
    unlockAudio();

    // レジュームが完了した時点で、まだタッチ中であれば再生を開始する
    ctx.resume().then(() => {
      if (isPointerDown) {
        _play();
      }
    }).catch(err => {
      console.error("Audio Context Resume Failed:", err);
    });
  } else {
    _play();
  }
}

function stopFlowNoise() {
  if (!flowNoiseActive || !flowNoiseGain) return;
  const ctx = getAudioCtx();
  if (!ctx || ctx.state !== 'running') {
    flowNoiseActive = false;
    return;
  }
  flowNoiseGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
  setTimeout(() => {
    try { flowNoiseSource.stop(); } catch (_) {}
    flowNoiseActive = false;
  }, 450);
}
/* 流体が吸い込まれるときの心地よい音（以前の温かいエネルギー感に戻す） */
function playAbsorbSound(freq) {
  if (!STATE.soundEnabled) return;
  const ctx  = getAudioCtx();
  if (!ctx || ctx.state !== 'running') return; // アンロックされるまでは何もしない

  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  // 三角波を使用して、正弦波よりも温かみと丸みのある音色にする
  osc.type = 'triangle';
  // 周波数を1オクターブ下げることで、落ち着いた温かいエネルギー感を表現
  osc.frequency.value = freq * 0.5;

  // ローパスフィルターで高音のキンキンする成分をカットし、こもった柔らかい音にする
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(800, ctx.currentTime);

  // アタックの角を取るために10msかけてフェードイン
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.18);
}

/* クリア時の美しい和音 */
function playClearChord() {
  if (!STATE.soundEnabled) return;
  const ctx  = getAudioCtx();
  if (!ctx || ctx.state !== 'running') return; // アンロックされるまでは何もしない

  const base = SKINS[STATE.skinId].soundFreq;
  [1, 1.26, 1.5, 1.89, 2.0].forEach((ratio, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = base * ratio;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.08 + i * 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 3.5);
  });
}

/* クリア時の炭酸音（さらに小さく調整、かつリバーブ対応） */
function playCarbonatedSound(originX) {
  if (!STATE.soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;

  if (ctx.state !== 'running') {
    ctx.resume().then(() => {
      playCarbonatedSound(originX);
    }).catch(() => {});
    return;
  }

  // キャッシュが生成されていなければ生成する
  if (!carbonatedBufferCache) {
    pregenerateCarbonatedBuffer();
  }
  if (!carbonatedBufferCache) return;

  try {
    const now = ctx.currentTime;
    const durationSeconds = 6.5;

    // 発生元のX座標から基準定位（パン）を計算（指定がない場合は中央）
    const basePan = (originX !== undefined) 
      ? Math.max(-1.0, Math.min(1.0, (originX / W) * 2 - 1)) 
      : 0;

    // AudioBufferSourceNode の作成と再生
    const noiseNode = ctx.createBufferSource();
    noiseNode.buffer = carbonatedBufferCache;

    let basePanner = null;
    try {
      if (ctx.createStereoPanner) {
        basePanner = ctx.createStereoPanner();
        basePanner.pan.setValueAtTime(basePan, now);
      }
    } catch (e) {}

    // ハイパスフィルターで高音のシュワシュワ成分のみを取り出す（一括適用）
    const filterNode = ctx.createBiquadFilter();
    filterNode.type = 'highpass';
    filterNode.frequency.setValueAtTime(4200, now);
    filterNode.frequency.exponentialRampToValueAtTime(2200, now + durationSeconds - 0.5);

    // ディレイ空間エコー回路
    const delayNodeL = ctx.createDelay(1.5);
    const delayNodeR = ctx.createDelay(1.5);

    const delayFeedbackL = ctx.createGain();
    const delayFeedbackR = ctx.createGain();
    
    delayNodeL.delayTime.setValueAtTime(0.16, now); 
    delayNodeR.delayTime.setValueAtTime(0.26, now); 
    
    delayFeedbackL.gain.setValueAtTime(0.42, now); 
    delayFeedbackR.gain.setValueAtTime(0.42, now);

    const delayFilterL = ctx.createBiquadFilter();
    const delayFilterR = ctx.createBiquadFilter();
    delayFilterL.type = 'bandpass';
    delayFilterL.frequency.setValueAtTime(3600, now);
    delayFilterL.Q.setValueAtTime(0.8, now); 
    
    delayFilterR.type = 'bandpass';
    delayFilterR.frequency.setValueAtTime(4200, now);
    delayFilterR.Q.setValueAtTime(0.8, now);

    let delayPannerL = null;
    let delayPannerR = null;
    try {
      if (ctx.createStereoPanner) {
        delayPannerL = ctx.createStereoPanner();
        delayPannerR = ctx.createStereoPanner();
        delayPannerL.pan.setValueAtTime(-0.9, now); 
        delayPannerR.pan.setValueAtTime(0.9, now);
      }
    } catch (e) {}

    // 接続
    if (basePanner) {
      noiseNode.connect(basePanner);
      basePanner.connect(filterNode);
    } else {
      noiseNode.connect(filterNode);
    }
    
    // ディレイへの接続（センド）
    filterNode.connect(delayNodeL);
    filterNode.connect(delayNodeR);

    delayNodeL.connect(delayFilterL);
    delayFilterL.connect(delayFeedbackL);
    delayFeedbackL.connect(delayNodeL);
    
    delayNodeR.connect(delayFilterR);
    delayFilterR.connect(delayFeedbackR);
    delayFeedbackR.connect(delayNodeR);

    // クロスフィードバック
    const delayCrossL = ctx.createGain();
    const delayCrossR = ctx.createGain();
    delayCrossL.gain.setValueAtTime(0.18, now); 
    delayCrossR.gain.setValueAtTime(0.18, now);
    delayFilterL.connect(delayCrossL);
    delayCrossL.connect(delayNodeR);
    delayFilterR.connect(delayCrossR);
    delayCrossR.connect(delayNodeL);

    // 出力ゲイン（最終音量微調整用 — 適度に包み込む音量）
    const outputGain = ctx.createGain();
    outputGain.gain.setValueAtTime(1.0, now);
    outputGain.gain.exponentialRampToValueAtTime(0.0001, now + durationSeconds);

    filterNode.connect(outputGain);
    outputGain.connect(ctx.destination);

    if (delayPannerL && delayPannerR) {
      delayFilterL.connect(delayPannerL);
      delayPannerL.connect(ctx.destination);
      delayFilterR.connect(delayPannerR);
      delayPannerR.connect(ctx.destination);
    } else {
      delayFilterL.connect(ctx.destination);
      delayFilterR.connect(ctx.destination);
    }

    noiseNode.start(now);
    noiseNode.stop(now + durationSeconds + 0.1);

    // クリーンアップ
    setTimeout(() => {
      try {
        noiseNode.disconnect();
        if (basePanner) basePanner.disconnect();
        filterNode.disconnect();
        outputGain.disconnect();
        delayNodeL.disconnect();
        delayNodeR.disconnect();
        delayFeedbackL.disconnect();
        delayFeedbackR.disconnect();
        delayCrossL.disconnect();
        delayCrossR.disconnect();
        if (delayPannerL) delayPannerL.disconnect();
        if (delayPannerR) delayPannerR.disconnect();
      } catch (e) {}
    }, 8000);
  } catch (e) {
    console.warn("炭酸音再生エラー:", e);
  }
}

  r.setProperty('--skin-fluid-a',   skin.fluidA);
  r.setProperty('--skin-fluid-b',   skin.fluidB);
  r.setProperty('--skin-crystal-a', skin.crystalA);
  r.setProperty('--skin-crystal-b', skin.crystalB);
  r.setProperty('--skin-glow',      skin.glow);
  r.setProperty('--skin-bg-a',      skin.bgA);
  r.setProperty('--skin-bg-b',      skin.bgB);
  r.setProperty('--skin-accent',    skin.accent);

  if (typeof crystalNuclei !== 'undefined') {

  }
}

function drawSkinPreview(canvas, skin) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, skin.bgA); bg.addColorStop(1, skin.bgB);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const gr = ctx.createRadialGradient(W*0.38, H*0.5, 0, W*0.38, H*0.5, W*0.38);
  gr.addColorStop(0, skin.fluidA + 'cc'); gr.addColorStop(1, skin.fluidB + '00');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.ellipse(W*0.38, H*0.5, W*0.33, H*0.38, 0, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = skin.crystalA + '80';
  ctx.lineWidth = 1; ctx.shadowBlur = 8; ctx.shadowColor = skin.crystalA;
  hexPath(ctx, W*0.72, H*0.42, 18); ctx.stroke();
  hexPath(ctx, W*0.80, H*0.64, 11); ctx.stroke();
  ctx.shadowBlur = 0;
}

function hexPath(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);

  const screenScale = Math.min(1.0, Math.min(W, H) / 768);
  
  // 粒子と結晶核を画面サイズに合わせて縮小（スマホ用最適化）
  PARTICLE_RADIUS = Math.max(2.2, 4.0 * screenScale);
  CRYSTAL_STEP    = Math.max(22, 36 * screenScale);
  CRYSTAL_RADIUS  = Math.max(16, 26 * screenScale);
  NUCLEUS_SAFE_ZONE = Math.max(100, 180 * screenScale);

  initStars();
