<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spacey Bloom — 宇宙と結晶の癒しゲーム</title>
  <meta name="description" content="宇宙の流動体を導き、星の結晶を咲かせる。脳を解放する究極の癒しゲーム Spacey Bloom。">
  <!-- Google Fonts Outfit -->
  <!-- TODO(security): CDN依存を削減するためにフォントをローカルホスティングに移行することを検討してください -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       デザインシステム & CSS 変数
    ============================================================ */
    :root {
      --skin-fluid-a:   #00f5ff;
      --skin-fluid-b:   #0080ff;
      --skin-crystal-a: #ffffff;
      --skin-crystal-b: #a8e6ff;
      --skin-glow:      #00f5ff;
      --skin-bg-a:      #000510;
      --skin-bg-b:      #001830;
      --skin-accent:    #00d4ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--skin-bg-a);
      font-family: 'Outfit', sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #gameCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: none;
      z-index: 1;
      touch-action: none;
    }

    /* ============================================================
       UI オーバーレイ（極限まで引き算）
    ============================================================ */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10000;
    }

    #controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: all;
    }

    .ctrl-btn {
      width: 40px; height: 40px; /* タップ可能領域確保のため 40px に拡大 */
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      opacity: 0.6; /* プレイの邪魔にならないよう、通常時は不透明度 60% に抑える */
    }
    .ctrl-btn:hover {
      border-color: var(--skin-accent);
      color: var(--skin-accent);
      opacity: 1.0;
      transform: scale(1.05);
    }
    .ctrl-btn:active { transform: scale(0.94); }

    /* ============================================================
       カウントダウンリング（猶予期間UI）
    ============================================================ */
    #readyWrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #readyWrap.show { opacity: 1; }

    #readyRing {
      position: relative;
      width: 120px; height: 120px;
    }
    #readyRing svg {
      width: 120px; height: 120px;
      overflow: visible;
    }
    #readyLabel {
      font-size: 11px;
      font-weight: 200;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      text-align: center;
    }

    /* ============================================================
       スキン選択パネル（ボトムシート）
    ============================================================ */
    #skinPanel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(4, 10, 24, 0.96);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px 24px 0 0;
      padding: 16px 20px 44px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10001;
      pointer-events: all;

      /* iPhone SE などの小さな画面でスクロールできるように制限・設定 */
      max-height: 82vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y; /* 縦方向スワイプスクロールのみネイティブで許容 */
    }
    #skinPanel.open { transform: translateY(0); }

    .settings-sys-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .settings-sys-btn {
      flex: 1;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: rgba(224, 242, 254, 0.8);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .settings-sys-btn:active {
      background: rgba(255,255,255,0.1);
      transform: scale(0.97);
    }

    .panel-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .skin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .skin-card {
      border-radius: 14px;
      padding: 14px 12px 12px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.025);
      position: relative;
      overflow: hidden;
    }
    .skin-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--card-a, #00f5ff18), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .skin-card:hover { transform: translateY(-2px); }
    .skin-card:hover::before { opacity: 1; }
    .skin-card.active {
      border-color: var(--card-a, #00f5ff);
      box-shadow: 0 0 18px var(--card-a, #00f5ff)40;
    }
    .skin-card.locked { cursor: default; }
    .skin-card.locked:hover { transform: none; }

    .skin-preview {
      width: 100%; aspect-ratio: 1.6;
      border-radius: 8px;
      margin-bottom: 9px;
      position: relative;
      overflow: hidden;
    }
    .skin-name {
      font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,0.75);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .skin-price {
      font-size: 11px; font-weight: 200;
      color: rgba(255,255,255,0.35);
      margin-top: 3px;
    }
    .lock-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 13px;
    }

    /* ── Bloom カラーパレット選択チップ ── */
    .bloom-palette-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .bloom-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      transition: border-color 0.2s, background 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    .bloom-chip:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }
    .bloom-chip.active {
      border-color: var(--chip-color, #ffffff);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.15), 0 0 8px var(--chip-color, rgba(255,255,255,0.4));
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      font-weight: 400;
    }
    .bloom-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ============================================================
       クリアオーバーレイ
    ============================================================ */
    #clearOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
      z-index: 9998;
    }
    #clearOverlay.show { opacity: 1; pointer-events: all; }

    .clear-sub {
      font-size: clamp(11px, 2.5vw, 14px);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      text-indent: 0.35em;
    }
    .clear-restart {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 8px 18px; /* 12px 36px から縮小 */
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 30px; /* 50px から縮小 */
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Outfit', sans-serif;
      font-size: 11px; /* 13px から縮小 */
      font-weight: 300;
      letter-spacing: 0.18em;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      text-indent: 0.18em;
    }
    .clear-restart:hover {
      border-color: var(--skin-accent);
      color: var(--skin-accent);
      box-shadow: 0 0 16px var(--skin-accent)33;
    }


    /* ============================================================
       チュートリアルヒント
    ============================================================ */
    #hint {
      position: fixed;
      bottom: 56px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px; font-weight: 200;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.28);
      text-align: center;
      pointer-events: none;
      transition: opacity 1.2s ease;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    /* スキントースト通知 */
    #skinToast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 14, 24, 0.74);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 24px;
      border-radius: 30px;
      color: rgba(224, 242, 254, 0.85);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      opacity: 0;
      pointer-events: none;
      z-index: 10002;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    #skinToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    /* ============================================================
       ローダー
    ============================================================ */
    #loader {
      position: fixed;
      inset: 0;
      background: #000510;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--skin-accent);
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 14px var(--skin-glow);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* トースト用アニメーション */
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* スタートオーバーレイ用スタイル */
    #startOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      cursor: pointer;
      background: rgba(8, 14, 24, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }
    #startOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .start-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(24px, 5.5vw, 36px);
      font-weight: 200;
      letter-spacing: 0.38em;
      color: rgba(224, 242, 254, 0.62); /* 明るさをさらにもう10%抑えた、青みがかった半透明白 */
      margin-bottom: 32px;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .logo-main {
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.4), 0 0 30px rgba(0, 245, 255, 0.2);
      animation: logoFade 4s ease-in-out infinite alternate;
      text-indent: 0.38em; /* 右側の余白偏りを補正 */
    }
    .logo-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--skin-accent), var(--skin-fluid-a), transparent);
      opacity: 0.85;
      box-shadow: 0 0 8px var(--skin-glow);
    }
    .start-sub {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      user-select: none;
      -webkit-user-select: none;
      transition: all 0.3s ease;
      text-indent: 0.25em;
    }
    }
    /* プレミアムなスタートボタン */
    .start-btn-premium {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: rgba(224, 242, 254, 0.95);
      border: 1px solid rgba(0, 245, 255, 0.35);
      padding: 16px 52px;
      border-radius: 40px;
      background: rgba(0, 5, 16, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.15), inset 0 0 15px rgba(0, 245, 255, 0.08);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      text-indent: 0.35em;
      margin-top: 10px;
    }
    .start-btn-premium:active {
      background: rgba(0, 245, 255, 0.15);
      box-shadow: 0 0 35px rgba(0, 245, 255, 0.35), inset 0 0 25px rgba(0, 245, 255, 0.2);
      transform: scale(0.97);
    }

  </style>
</head>
<body>

<!-- スタートオーバーレイ -->
<div id="startOverlay" role="dialog" aria-label="ゲームスタート">
  <h1 class="start-title"><span class="logo-main">SPACEY BLOOM</span><span class="logo-line"></span></h1>
  <button id="btnStartGame" class="start-btn-premium">START</button>
</div>

<!-- ローダー -->
<div id="loader" aria-hidden="true"><div class="loader-ring"></div></div>

<!-- ゲームキャンバス -->
<canvas id="gameCanvas" aria-label="Fluid and Crystal game canvas"></canvas>

<!-- 最小UIオーバーレイ -->
<div id="ui" role="complementary" aria-label="ゲームコントロール">
  <div id="controls">
    <button class="ctrl-btn" id="btnSettings" aria-label="設定" title="設定">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- カウントダウンリング（猶予期間UI） -->
<div id="readyWrap" aria-hidden="true">
  <div id="readyRing">
    <!-- SVGはJSで安全に生成 -->
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="readyLabel">流体を導こう</div>
</div>

<!-- スキン選択パネル -->
<div id="skinPanel" role="dialog" aria-label="設定" aria-hidden="true">
  <div class="panel-handle"></div>
  <p class="panel-title">テーマを選択</p>
  <div class="skin-grid" id="skinGrid"></div>

  <p class="panel-title" style="margin-top:20px;">Bloom カラー</p>
  <div class="bloom-palette-grid" id="bloomPaletteGrid" role="group" aria-label="Bloomカラーパターン選択"></div>

  <p class="panel-title" style="margin-top:20px;">システム設定</p>
  <div class="settings-sys-row">
    <button class="settings-sys-btn" id="btnSoundSettings" aria-label="サウンドオンオフ">サウンド: ON</button>
    <button class="settings-sys-btn" id="btnResetSettings" aria-label="設定を閉じてゲームを再開する">再開</button>
  </div>
</div>

<!-- クリアオーバーレイ -->
<div id="clearOverlay" role="status" aria-live="polite">
  <div class="start-title"><span class="logo-main">SPACEY BLOOM</span><span class="logo-line"></span></div>
  <div class="clear-sub">脳が解放される</div>
  <button class="clear-restart" id="clearRestart" aria-label="もう一度プレイする">もう一度</button>
</div>

<!-- チュートリアルヒント -->
<div id="hint" aria-label="操作ヒント">画面をなぞって光る流体を導こう</div>

<!-- スキントースト通知 -->
<div id="skinToast" role="status" aria-live="polite"></div>

<script>
/*
 * TODO(security): 本番環境では以下の HTTP セキュリティヘッダーを設定してください:
 *   Content-Security-Policy: default-src 'self'; script-src 'self' 'nonce-{RANDOM}';
 *                             font-src https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com;
 *   X-Frame-Options: DENY
 *   X-Content-Type-Options: nosniff
 *   Permissions-Policy: camera=(), microphone=(), geolocation=()
 * インラインスクリプトを含むため nonce または hash ベースの CSP が必要です。
 * TODO(security): 将来の課金機能には OAuth 2.0 プロバイダーを使用してください。
 * TODO(security): ゲーム設定のみ localStorage に保存。機密情報は一切保存しません。
 */
'use strict';

/* ============================================================
   スキン定義（完全ホワイトリスト — ユーザー入力なし・XSS対策済み）
============================================================ */
const SKINS = [
  {
    id: 0, name: '🤍 白銀 × 銀世界',
    fluidA: '#f0f5fa', fluidB: '#b8cbd8',  // 流体：青白い白銀
    crystalA: '#e2e8f0', crystalB: '#cbd5e1', // 結晶：シルバーのまま
    glow: '#e0ebf5', bgA: '#050508', bgB: '#101015', accent: '#e0ebf5',
    soundFreq: 264, // ソルフェジオ 528Hzの1オクターブ下 (恐怖からの解放・グラウンディング)
  },
  {
    id: 1, name: '🌍 ブルー × 大気圏',
    fluidA: '#5ebbff', fluidB: '#0044ff',  // 流体：さらに明るいブルー
    crystalA: '#80c8ff', crystalB: '#ffffff', // 結晶：澄み切った青白結晶
    glow: '#8cd9ff', bgA: '#010308', bgB: '#001133', accent: '#8cd9ff',
    soundFreq: 852, // ソルフェジオ 852Hz (直感の覚醒・インスピレーション)
  },
  {
    id: 2, name: '🌸 桜 × 翡翠',
    fluidA: '#ffd5e0', fluidB: '#fff0f3',
    crystalA: '#50fa7b', crystalB: '#a8ffb8',
    glow: '#ffd5e0', bgA: '#080008', bgB: '#180010', accent: '#ffd5e0',
    soundFreq: 639, // ソルフェジオ 639Hz (愛・調和・人間関係の修復)
  },

let audioCtx = null;

function getAudioCtx() {
  // ★iOS対策: ユーザー操作前に AudioContext を自動生成しない。
  // 生成は unlockAudio() の中だけで行う。
  return audioCtx;
}

let solfeggioOscs = [];
let solfeggioLFOs = [];
let solfeggioNodes = [];
let solfeggioFilterNode = null;

let isResuming = false; // resume()の多重呼び出し防止フラグ

/* 528Hzを主音とする美しい「ド・ミ・ソ・シ・レ (Cmaj9)」コーラス環境音の開始（ピンポンディレイ回路） */
function startAmbientSolfeggio() {
  if (!STATE.soundEnabled) return;
  if (!audioCtx) return; // AudioContextがなければ何もしない

  // ★脳リフレクソ方式: suspendedなら resume して自分を再帰呼び出し
  if (audioCtx.state !== 'running') {
    if (!isResuming) {
      isResuming = true;
      audioCtx.resume().then(() => {
        isResuming = false;
        stopAmbientSolfeggio(); // 古いノードを確実に破棄
        startAmbientSolfeggio(); // 自己再帰で再試行
      }).catch(() => { isResuming = false; });
    }
    return; // suspended中は新規ノード作成に進まず抜ける
  }

  if (solfeggioOscs.length > 0) return; // すでに再生中なら何もしない

  const ctx = audioCtx;

  const now = ctx.currentTime;
  try {
    // 1. マスターゲイン（5声×2オシレーター＋リバーブの合計のため適正値に調整）
    const solfeggioGain = ctx.createGain();
    solfeggioGain.gain.setValueAtTime(0, now);
    solfeggioGain.gain.linearRampToValueAtTime(0.022, now + 3.0); // 3秒かけて非常に滑らかにフェードイン
    solfeggioNodes.push(solfeggioGain);
    solfeggioMasterGain = solfeggioGain;

    // 2. メインの音色をマイルドにするローパスフィルター
    solfeggioFilterNode = ctx.createBiquadFilter();
    solfeggioFilterNode.type = 'lowpass';
    solfeggioFilterNode.frequency.setValueAtTime(420, now); // 420Hzでこもらせて角を取り、暖かみを出す
    solfeggioNodes.push(solfeggioFilterNode);

    // 3. 【極上空間リバーブ回路】4系統の並列モジュレーション・ディレイ
    // 遅延時間を素数比率（310ms, 470ms, 630ms, 890ms）にして、残響の密度を最大化しうねりを生む
    const delayTimes = [0.31, 0.47, 0.63, 0.89];
    const delayNodes = [];
    const feedbackGains = [];
    
    // リバーブ全体の出力をまとめるミキサー
    const reverbMix = ctx.createGain();
    reverbMix.gain.setValueAtTime(0.75, now); // 残響音のミックス比
    solfeggioNodes.push(reverbMix);

    delayTimes.forEach((time, idx) => {
      const delay = ctx.createDelay(2.0);
      delay.delayTime.setValueAtTime(time, now);

      // ディレイタイムをゆっくり揺らすLFO（ディレイ・コーラス）で空間に奥行きを出す
      const delayLFO = ctx.createOscillator();
      const delayLFOGain = ctx.createGain();
      delayLFO.type = 'sine';
      delayLFO.frequency.setValueAtTime(0.08 + idx * 0.03, now); // 0.08Hz〜0.17Hzの超低速
      delayLFOGain.gain.setValueAtTime(0.003, now); // ±3msのディレイタイム変調

      delayLFO.connect(delayLFOGain);
      delayLFOGain.connect(delay.delayTime);
      delayLFO.start(now);

      solfeggioLFOs.push(delayLFO);
      solfeggioNodes.push(delayLFOGain, delay);

      // フィードバックゲイン（長く心地よい宇宙的残響）
      const fb = ctx.createGain();
      fb.gain.setValueAtTime(0.68, now); // 68%の減衰フィードバック
      solfeggioNodes.push(fb);

      // 接続
      delay.connect(fb);
      fb.connect(delay); // フィードバックループ

      delayNodes.push(delay);
      feedbackGains.push(fb);
    });

    // 入力信号を4つのディレイラインに並列接続
    solfeggioGain.connect(solfeggioFilterNode);
    
    // 直接音（ドライ）の出力
    const directGain = ctx.createGain();
    directGain.gain.setValueAtTime(0.38, now);
    solfeggioFilterNode.connect(directGain);
    directGain.connect(ctx.destination);
    solfeggioNodes.push(directGain);

    // 反響音（ウェット）をディレイマトリクスへ送信
    delayNodes.forEach((delay, idx) => {
      solfeggioFilterNode.connect(delay);
      
      // 隣り合うディレイライン同士を少しだけ交差接続させて豊かな反射音を合成
      const crossIdx = (idx + 1) % delayNodes.length;
      const crossGain = ctx.createGain();
      crossGain.gain.setValueAtTime(0.22, now);
      delay.connect(crossGain);
      crossGain.connect(delayNodes[crossIdx]);
      solfeggioNodes.push(crossGain);

      // ミキサーへ出力
      delay.connect(reverbMix);
    });

    reverbMix.connect(ctx.destination);

    // 4. 【ド・ミ・ソ・シ・レ (Cmaj9)】和音構成 ＋ 聖歌隊コーラス（オクターブ倍音）
    const chord = [
      { ratio: 1.0,   vol: 1.0,  lfoSpeed: 0.16 }, // ド (基準音)
      { ratio: 1.25,  vol: 0.78, lfoSpeed: 0.20 }, // ミ (1.25倍)
      { ratio: 1.5,   vol: 0.68, lfoSpeed: 0.14 }, // ソ (1.5倍)
      { ratio: 1.875, vol: 0.48, lfoSpeed: 0.24 }, // シ (1.875倍)
      { ratio: 1.125, vol: 0.58, lfoSpeed: 0.12 }, // レ (1.125倍)
    ];

    const baseFreq = SKINS[STATE.skinId].soundFreq;

    chord.forEach(tone => {
      // --- 基音（柔らかい正弦波） ---
      const osc = ctx.createOscillator();
      const toneGain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq * tone.ratio, now);

      // 基音のピッチを揺らすLFO（コーラス効果）
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.type = 'sine';
      lfo.frequency.setValueAtTime(tone.lfoSpeed, now);
      lfoGain.gain.setValueAtTime(1.8, now); // ±1.8Hzのうねり

      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(now);
      solfeggioLFOs.push(lfo);
      solfeggioNodes.push(lfoGain);

      toneGain.gain.setValueAtTime(tone.vol * 0.75, now);
      osc.connect(toneGain);
      toneGain.connect(solfeggioGain);
      osc.start(now);
      solfeggioOscs.push({ node: osc, ratio: tone.ratio });
      solfeggioNodes.push(toneGain);

      // --- 倍音ブレンド（1オクターブ上、聖歌隊のクワイア感をシミュレート） ---
      const overtoneOsc = ctx.createOscillator();
      const overtoneGain = ctx.createGain();
      overtoneOsc.type = 'sine';
      overtoneOsc.frequency.setValueAtTime(baseFreq * tone.ratio * 2.0, now); // 1オクターブ上

      // 基音と少しだけ揺らぎの位相をずらしたLFO変調
      const overtoneLFO = ctx.createOscillator();
      const overtoneLFOGain = ctx.createGain();
      overtoneLFO.type = 'sine';
      overtoneLFO.frequency.setValueAtTime(tone.lfoSpeed * 1.15, now); // 周期を僅かにずらす
      overtoneLFOGain.gain.setValueAtTime(1.2, now);

      overtoneLFO.connect(overtoneLFOGain);
      overtoneLFOGain.connect(overtoneOsc.frequency);
      overtoneLFO.start(now);
      solfeggioLFOs.push(overtoneLFO);
      solfeggioNodes.push(overtoneLFOGain);

      overtoneGain.gain.setValueAtTime(tone.vol * 0.14, now); // 倍音は控えめにブレンド（元の約14%）
      overtoneOsc.connect(overtoneGain);
      overtoneGain.connect(solfeggioGain);
      overtoneOsc.start(now);
      
      solfeggioOscs.push({ node: overtoneOsc, ratio: tone.ratio * 2.0 });
      solfeggioNodes.push(overtoneGain);
    });

  } catch (e) {
    console.warn("ソルフェジオ環境音の開始に失敗しました:", e);
  }
}

/* ソルフェジオ環境音の停止 */
function stopAmbientSolfeggio() {
  solfeggioOscs.forEach(item => {
    try { item.node.stop(); item.node.disconnect(); } catch (_) {}
  });
  solfeggioOscs = [];

  solfeggioLFOs.forEach(lfo => {
    try { lfo.stop(); lfo.disconnect(); } catch (_) {}
  });
  solfeggioLFOs = [];

  solfeggioNodes.forEach(node => {
    try { node.disconnect(); } catch (_) {}
  });
  solfeggioNodes = [];
  solfeggioFilterNode = null;
  solfeggioMasterGain = null;
}

/* スキン変更時などに、iOS音声ロックを避けるためオシレーターを止めずに周波数を滑らかにスイープ変更する */
function updateSolfeggioFrequencies() {
  if (!audioCtx || audioCtx.state !== 'running' || solfeggioOscs.length === 0) return;
  const now = audioCtx.currentTime;
  const baseFreq = SKINS[STATE.skinId].soundFreq;

  solfeggioOscs.forEach(item => {
    try {
      // 0.8秒かけて新しい周波数に滑らかに変更（iOSの音声ロックを100%防ぎ、遷移も美しい）
      item.node.frequency.exponentialRampToValueAtTime(baseFreq * item.ratio, now + 0.8);
    } catch (_) {}
  });
}



/* iOS (iPhone) Safari の音声保護ロックを確実に解除する処理
   ★脳リフレクソ(initAudio)と完全に同じロジックで実装 */
/* iOS (iPhone) Safari の音声保護ロックを確実に解除する処理
   ★脳リフレクソと同じく、タッチやクリックのたびに何度でも呼び出し可能にし、
   もし音声コンテキストが停止(suspended)していれば常に同期的に resume を試みる。 */
function unlockAudio() {
  try {
    // 確実にサウンドフラグをONにする（localStorageのバグなどによるミュートを防止）
    STATE.soundEnabled = true;

    // ★Chrome (iOS) 対策: 物理ボタンをタッチした直下の第一階層コールスタックで、
    // HTML5 Audio要素を作成して同期再生し、スピーカーを強制開放する
    try {
      const audio = new Audio();
      audio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAARKwAARKwAAAEAAgAZAAAATUFOWQAAAAADAAgAZGF0YQgAAAAAAAAA';
      audio.volume = 0.0001; // 耳に聞こえない極微小音量
      audio.play().catch(() => {});
    } catch (_) {}

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (audioCtx && audioCtx.state === 'closed') {
      audioCtx = null;
      carbonatedBufferCache = null; // キャッシュバッファもクリア
    }
    if (!audioCtx && AudioContextClass) {
      audioCtx = new AudioContextClass();
      carbonatedBufferCache = null; // 新規生成時は確実にキャッシュをクリアして再生成させる
    }
    
    if (audioCtx) {
      // suspended / interrupted（iOS固有）の場合は resume() を試みる
      // suspended / interrupted（iOS固有）の場合は resume() を試みる
      if (audioCtx.state !== 'running') {
        // 同期的にも即座に発音ノードの生成を走らせる（Chrome / 旧Safari対策）
        pregenerateCarbonatedBuffer();
        startAmbientSolfeggio();

        audioCtx.resume().then(() => {
          pregenerateCarbonatedBuffer();
          startAmbientSolfeggio();
        }).catch((err) => {
          console.warn("AudioContextのresumeに失敗しました:", err);
        });
      } else {
        pregenerateCarbonatedBuffer();
        startAmbientSolfeggio();
      }
      
      // 状態変化時の自動復旧リスナーを設定（バックグラウンドから戻った時など）
      if (!audioCtx._stateChangeListenerAdded) {
        audioCtx._stateChangeListenerAdded = true;
        audioCtx.onstatechange = () => {
          if (audioCtx.state === 'running') {
            pregenerateCarbonatedBuffer();
            startAmbientSolfeggio();
          }
        };
      }
      
      // ロック解除のためのダミー無音再生
      try {
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = ctx => {
          const src = ctx.createBufferSource();
          src.buffer = buffer;
          src.connect(ctx.destination);
          src.start(0);
        };
        source(audioCtx);
      } catch (err) {
        console.warn("ダミー音声再生に失敗しました:", err);
      }
    }
  } catch (e) {
    console.warn("Web Audio APIの初期化に失敗しました。無音で動作します:", e);
  }
}

let flowNoiseSource = null, flowNoiseGain = null, flowNoiseActive = false;

function startFlowNoise() {
  startAmbientSolfeggio(); // 操作開始時に環境音を確実に再生開始する
  return; // 風のようなノイズ音を消去
  if (!STATE.soundEnabled || flowNoiseActive) return;
  const ctx = getAudioCtx();
  if (!ctx) return;

  const _play = () => {
    if (flowNoiseActive) return;

    const bufSize = ctx.sampleRate * 2;
    const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 900; lpf.Q.value = 0.4;

    const gain = ctx.createGain();
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.045, now + 0.35);

    src.connect(lpf); lpf.connect(gain); gain.connect(ctx.destination);
    src.start();
    flowNoiseSource = src; flowNoiseGain = gain; flowNoiseActive = true;
  };

  if (ctx.state === 'suspended') {
    // 同期的にアンロック処理（オシレーター再生 → resume() のシーケンス）を開始
    unlockAudio();

    // レジュームが完了した時点で、まだタッチ中であれば再生を開始する
    ctx.resume().then(() => {
      if (isPointerDown) {
        _play();
      }
    }).catch(err => {
      console.error("Audio Context Resume Failed:", err);
    });
  } else {
    _play();
  }
}

function stopFlowNoise() {
  if (!flowNoiseActive || !flowNoiseGain) return;
  const ctx = audioCtx;
  if (!ctx || ctx.state !== 'running') {
    flowNoiseActive = false;
    return;
  }
  flowNoiseGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.35);
  setTimeout(() => {
    try { flowNoiseSource.stop(); } catch (_) {}
    flowNoiseActive = false;
  }, 450);
}
/* 流体が吸い込まれるときの心地よい音（以前の温かいエネルギー感に戻す） */
function playAbsorbSound(freq) {
  if (!STATE.soundEnabled) return;
  const ctx = audioCtx;
  if (!ctx || ctx.state !== 'running') return; // アンロックされるまでは何もしない

  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  // 三角波を使用して、正弦波よりも温かみと丸みのある音色にする
  osc.type = 'triangle';
  // 周波数を1オクターブ下げることで、落ち着いた温かいエネルギー感を表現
  osc.frequency.value = freq * 0.5;

  // ローパスフィルターで高音のキンキンする成分をカットし、こもった柔らかい音にする
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(800, ctx.currentTime);

  // アタックの角を取るために10msかけてフェードイン
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.18);
}

/* 3つ目の結晶開花時の「煌めきのチャイム音」（高音のアルペジオ） */
function playChimeSound(baseFreq) {
  if (!STATE.soundEnabled) return;
  const ctx = audioCtx;
  if (!ctx || ctx.state !== 'running') return;

  const now = ctx.currentTime;
  // 煌びやかな高音の周波数配列（baseFreqが渡された場合はそれを基準にし、なければ従来の固定周波数）
  let chimeFreqs;
  if (baseFreq) {
    // 結晶核の周波数を4倍してチャイム音にふさわしい高音のベースにする
    const ref = baseFreq * 4;
    chimeFreqs = [ref, ref * 1.25, ref * 1.5, ref * 1.875, ref * 2.25, ref * 2.75];
  } else {
    chimeFreqs = [1200, 1500, 1800, 2200, 2700, 3300];
  }

  chimeFreqs.forEach((freq, idx) => {
    // わずかにディレイ（アルペジオ効果）をつけて発音
    const delayTime = idx * 0.06; 
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + delayTime);

    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(freq, now + delayTime);
    filter.Q.setValueAtTime(1.2, now + delayTime);

    gain.gain.setValueAtTime(0, now + delayTime);
    gain.gain.linearRampToValueAtTime(0.0018, now + delayTime + 0.015);
    // すぐに消えるが、一部をディレイやリバーブへ送り込んで美しい余韻を残す
    gain.gain.exponentialRampToValueAtTime(0.0001, now + delayTime + 1.2);

    osc.connect(filter);
    filter.connect(gain);

    gain.connect(ctx.destination);

    // リバーブを廃止する代わりに、余韻のカーブを緩やかにして美しく残響させる
    gain.gain.exponentialRampToValueAtTime(0.0001, now + delayTime + 2.2);

    osc.start(now + delayTime);
    osc.stop(now + delayTime + 2.2);
  });
}

/* 全満開時（3つ目の結晶開花）の特別でおしゃれなゴージャスチャイム音 */
function playSpecialChimeSound(baseFreq) {
  if (!STATE.soundEnabled) return;
  const ctx = audioCtx;
  if (!ctx || ctx.state !== 'running') return;

  const now = ctx.currentTime;
  const ref = (baseFreq || 300) * 4;

  // おしゃれでゴージャスなテンションコード（メジャー9th/11thなど）の上昇＆下降アルペジオ（10音）
  const ratios = [1.0, 1.25, 1.5, 1.875, 2.25, 2.667, 3.0, 3.75, 4.5, 5.0];
  
  ratios.forEach((ratio, idx) => {
    // アルペジオのディレイ（少し細かくしてキラキラ感を出す）
    const delayTime = idx * 0.05;
    const freq = ref * ratio;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + delayTime);

    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(freq, now + delayTime);
    filter.Q.setValueAtTime(1.5, now + delayTime);

    // パン（左右交互に美しく広がるステレオ感）
    let panner = null;
    if (ctx.createStereoPanner) {
      panner = ctx.createStereoPanner();
      // 交互に左・右へ大きく振る (-0.75 〜 0.75)
      const panVal = (idx % 2 === 0) ? -0.75 : 0.75;
      panner.pan.setValueAtTime(panVal, now + delayTime);
    }

    gain.gain.setValueAtTime(0, now + delayTime);
    // 音数が多く広がりがあるため、個々の音量を控えめにして透明感を出す
    gain.gain.linearRampToValueAtTime(0.0035, now + delayTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + delayTime + 2.5);

    osc.connect(filter);
    filter.connect(gain);

    if (panner) {
      gain.connect(panner);
      panner.connect(ctx.destination);
    } else {
      gain.connect(ctx.destination);
    }

    osc.start(now + delayTime);
    osc.stop(now + delayTime + 2.5);
  });
}


/* クリア時の美しい和音 */
function playClearChord() {
  if (!STATE.soundEnabled) return;
  const ctx = audioCtx;
  if (!ctx || ctx.state !== 'running') return; // アンロックされるまでは何もしない

  const base = SKINS[STATE.skinId].soundFreq;
  [1, 1.26, 1.5, 1.89, 2.0].forEach((ratio, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = base * ratio;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.08 + i * 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 3.5);
  });
}

/* クリア時の炭酸音（さらに小さく調整、かつリバーブ対応） */
function playCarbonatedSound(originX) {
  if (!STATE.soundEnabled) return;
  const ctx = audioCtx;
  if (!ctx) return;

  if (ctx.state !== 'running') {
    ctx.resume().then(() => {
      playCarbonatedSound(originX);
    }).catch(() => {});
    return;
  }

  // キャッシュが生成されていなければ生成する
  if (!carbonatedBufferCache) {
    pregenerateCarbonatedBuffer();
  }
  if (!carbonatedBufferCache) return;

  try {
    const now = ctx.currentTime;
    const durationSeconds = 6.5;

    // 発生元のX座標から基準定位（パン）を計算（指定がない場合は中央）
    const basePan = (originX !== undefined) 
      ? Math.max(-1.0, Math.min(1.0, (originX / W) * 2 - 1)) 
      : 0;

    // AudioBufferSourceNode の作成と再生
    const noiseNode = ctx.createBufferSource();
    noiseNode.buffer = carbonatedBufferCache;

    let basePanner = null;
    try {
      if (ctx.createStereoPanner) {
        basePanner = ctx.createStereoPanner();
        basePanner.pan.setValueAtTime(basePan, now);
      }
    } catch (e) {}

    // ハイパスフィルターで高音のシュワシュワ成分のみを取り出す（一括適用）
    const filterNode = ctx.createBiquadFilter();
    filterNode.type = 'highpass';
    filterNode.frequency.setValueAtTime(4200, now);
    filterNode.frequency.exponentialRampToValueAtTime(2200, now + durationSeconds - 0.5);

    // ディレイ空間エコー回路
    const delayNodeL = ctx.createDelay(1.5);
    const delayNodeR = ctx.createDelay(1.5);

    const delayFeedbackL = ctx.createGain();
    const delayFeedbackR = ctx.createGain();
    
    delayNodeL.delayTime.setValueAtTime(0.16, now); 
    delayNodeR.delayTime.setValueAtTime(0.26, now); 
    
    delayFeedbackL.gain.setValueAtTime(0.42, now); 
    delayFeedbackR.gain.setValueAtTime(0.42, now);

    const delayFilterL = ctx.createBiquadFilter();
    const delayFilterR = ctx.createBiquadFilter();
    delayFilterL.type = 'bandpass';
    delayFilterL.frequency.setValueAtTime(3600, now);
    delayFilterL.Q.setValueAtTime(0.8, now); 
    
    delayFilterR.type = 'bandpass';
    delayFilterR.frequency.setValueAtTime(4200, now);
    delayFilterR.Q.setValueAtTime(0.8, now);

    let delayPannerL = null;
    let delayPannerR = null;
    try {
      if (ctx.createStereoPanner) {
        delayPannerL = ctx.createStereoPanner();
        delayPannerR = ctx.createStereoPanner();
        delayPannerL.pan.setValueAtTime(-0.9, now); 
        delayPannerR.pan.setValueAtTime(0.9, now);
      }
    } catch (e) {}

    // 接続
    if (basePanner) {
      noiseNode.connect(basePanner);
      basePanner.connect(filterNode);
    } else {
      noiseNode.connect(filterNode);
    }
    
    // ディレイへの接続（センド）
    filterNode.connect(delayNodeL);
    filterNode.connect(delayNodeR);

    delayNodeL.connect(delayFilterL);
    delayFilterL.connect(delayFeedbackL);
    delayFeedbackL.connect(delayNodeL);
    
    delayNodeR.connect(delayFilterR);
    delayFilterR.connect(delayFeedbackR);
    delayFeedbackR.connect(delayNodeR);

    // クロスフィードバック
    const delayCrossL = ctx.createGain();
    const delayCrossR = ctx.createGain();
    delayCrossL.gain.setValueAtTime(0.18, now); 
    delayCrossR.gain.setValueAtTime(0.18, now);
    delayFilterL.connect(delayCrossL);
    delayCrossL.connect(delayNodeR);
    delayFilterR.connect(delayCrossR);
    delayCrossR.connect(delayNodeL);

    // 出力ゲイン（最終音量微調整用 — 適度に包み込む音量）
    const outputGain = ctx.createGain();
    outputGain.gain.setValueAtTime(1.0, now);
    outputGain.gain.exponentialRampToValueAtTime(0.0001, now + durationSeconds);

    filterNode.connect(outputGain);
    outputGain.connect(ctx.destination);

    if (delayPannerL && delayPannerR) {
      delayFilterL.connect(delayPannerL);
      delayPannerL.connect(ctx.destination);
      delayFilterR.connect(delayPannerR);
      delayPannerR.connect(ctx.destination);
    } else {
      delayFilterL.connect(ctx.destination);
      delayFilterR.connect(ctx.destination);
    }

    noiseNode.start(now);
    noiseNode.stop(now + durationSeconds + 0.1);

    // クリーンアップ
    setTimeout(() => {
      try {
        noiseNode.disconnect();
        if (basePanner) basePanner.disconnect();
        filterNode.disconnect();
        outputGain.disconnect();
        delayNodeL.disconnect();
        delayNodeR.disconnect();
        delayFeedbackL.disconnect();
        delayFeedbackR.disconnect();
        delayCrossL.disconnect();
        delayCrossR.disconnect();
        if (delayPannerL) delayPannerL.disconnect();
        if (delayPannerR) delayPannerR.disconnect();
      } catch (e) {}
    }, 8000);
  } catch (e) {
    console.warn("炭酸音再生エラー:", e);
  }
}

function applySkin(id) {
  const skin = SKINS[id];
  if (!skin) return;
  STATE.skinId = id;
  const r = document.documentElement.style;
  r.setProperty('--skin-fluid-a',   skin.fluidA);
  r.setProperty('--skin-fluid-b',   skin.fluidB);
  r.setProperty('--skin-crystal-a', skin.crystalA);
  r.setProperty('--skin-crystal-b', skin.crystalB);
  r.setProperty('--skin-glow',      skin.glow);
  r.setProperty('--skin-bg-a',      skin.bgA);
  r.setProperty('--skin-bg-b',      skin.bgB);
  r.setProperty('--skin-accent',    skin.accent);
  try { localStorage.setItem('fc_skinId', String(id)); } catch (_) {}
  // ※ resetGame() はここでは呼ばない。呼び出し元が状況に応じて制御する。
  
  // キャッシュ済みの結晶画像をスキンカラーに合わせて再生成するためにキャッシュを破棄
  if (typeof crystalNuclei !== 'undefined') {
    crystalNuclei.forEach(n => { n.isCached = false; n.cacheCanvas = null; });
  }
}

  grid.replaceChildren(); /* セキュア: innerHTML = '' を使わない */

  SKINS.forEach((skin, idx) => {

    card.style.setProperty('--card-a', skin.fluidA);

    /* プレビューキャンバス */
    const preview = document.createElement('div');
    preview.className = 'skin-preview';
    const cvs = document.createElement('canvas');
    cvs.width = 180; cvs.height = 112;
    cvs.style.cssText = 'width:100%;height:100%;display:block;border-radius:7px;';
    drawSkinPreview(cvs, skin);
    preview.appendChild(cvs);

    if (skin.locked) {
      const lock = document.createElement('span');
      lock.className = 'lock-badge';
      lock.textContent = '🔒';
      lock.setAttribute('aria-hidden', 'true');
      preview.appendChild(lock);
    }

    const nameEl  = document.createElement('div');
    nameEl.className = 'skin-name';
    nameEl.textContent = skin.name; /* textContent で XSS 安全 */

    const priceEl = document.createElement('div');
    priceEl.className = 'skin-price';
    priceEl.textContent = skin.price;

    card.appendChild(preview);
    card.appendChild(nameEl);
    card.appendChild(priceEl);

    card.addEventListener('click', () => {
      if (skin.locked) { showToast(skin.name + ' — ' + skin.price + ' でご利用いただけます'); return; }
      applySkin(idx);
      document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));

      showToast(skin.name + ' に変更しました');

    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });

    grid.appendChild(card);
  });

  /* ── Bloom カラーチップを構築 ── */
  // パレットごとの代表色（プレビュー用ドット）
  const BLOOM_DOT_COLORS = ['#ff80e0', '#3ab5f8', '#4d7dff', '#3ddc84', '#ff6b3d', '#bb77dd', '#ff44bb'];
  const bloomGrid = document.getElementById('bloomPaletteGrid');
  bloomGrid.replaceChildren();

  BLOOM_PALETTES.forEach((pal, idx) => {
    const chip = document.createElement('button');
    chip.className = 'bloom-chip' + (idx === STATE.bloomPaletteId ? ' active' : '');
    chip.setAttribute('type', 'button');
    chip.setAttribute('aria-pressed', String(idx === STATE.bloomPaletteId));
    chip.setAttribute('aria-label', pal.name);
    chip.dataset.bloomId = String(idx);
    chip.style.setProperty('--chip-color', BLOOM_DOT_COLORS[idx]);

    const dot = document.createElement('span');
    dot.className = 'bloom-dot';
    dot.style.background = BLOOM_DOT_COLORS[idx] || '#fff';
    dot.setAttribute('aria-hidden', 'true');

    const label = document.createElement('span');
    label.textContent = pal.name; // textContent で XSS 安全

    chip.appendChild(dot);
    chip.appendChild(label);

    chip.addEventListener('click', () => {
      STATE.bloomPaletteId = idx;
      try { localStorage.setItem('fc_bloomPaletteId', String(idx)); } catch (_) {}
      // キャッシュ済み結晶を無効化して再描画
      if (typeof crystalNuclei !== 'undefined') {
        crystalNuclei.forEach(n => { n.isCached = false; n.cacheCanvas = null; });
      }
      document.querySelectorAll('.bloom-chip').forEach(c => {
        c.classList.remove('active');
        c.setAttribute('aria-pressed', 'false');
      });
      chip.classList.add('active');
      chip.setAttribute('aria-pressed', 'true');
    });

    bloomGrid.appendChild(chip);
  });
}

function drawSkinPreview(canvas, skin) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, skin.bgA); bg.addColorStop(1, skin.bgB);
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const gr = ctx.createRadialGradient(W*0.38, H*0.5, 0, W*0.38, H*0.5, W*0.38);
  gr.addColorStop(0, skin.fluidA + 'cc'); gr.addColorStop(1, skin.fluidB + '00');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.ellipse(W*0.38, H*0.5, W*0.33, H*0.38, 0, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = skin.crystalA + '80';
  ctx.lineWidth = 1; ctx.shadowBlur = 8; ctx.shadowColor = skin.crystalA;
  hexPath(ctx, W*0.72, H*0.42, 18); ctx.stroke();
  hexPath(ctx, W*0.80, H*0.64, 11); ctx.stroke();
  ctx.shadowBlur = 0;
}

function hexPath(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function showToast(text) {
  const prev = document.getElementById('fc-toast');

    'position:fixed;bottom:320px;left:50%;transform:translateX(-50%);',
    'background:rgba(0,0,0,0.88);border:1px solid rgba(255,255,255,0.12);',
    'border-radius:12px;padding:11px 20px;',
    'font-size:12px;font-weight:200;letter-spacing:0.06em;',
    'color:rgba(255,255,255,0.75);z-index:201;pointer-events:none;',
    'animation:fadeInOut 2.2s ease forwards;',
  ].join('');
  el.textContent = text; /* textContent で XSS 安全 */
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 2300);
}
